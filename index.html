// ─── ROOT (auth gate) ───────────────────────────────────────────
function Root(){
  const[loggedIn,setLoggedIn]=useState(()=>{try{return sessionStorage.getItem('jrn_auth')==='1'||localStorage.getItem('jrn_remember')==='1'}catch{return false}});
  const[picked,setPicked]=useState(null); // {date, tod}
  function handleLogin(u){setLoggedIn(true);try{sessionStorage.setItem('jrn_auth','1');}catch{}}
  function handleLogout(){setLoggedIn(false);setPicked(null);try{sessionStorage.removeItem('jrn_auth');}catch{}}
  if(!loggedIn)return <LoginScreen onLogin={handleLogin}/>;
  if(!picked)return <LandingScreen onPick={(date,tod)=>setPicked({date,tod})} onLogout={handleLogout}/>;
  return <App initDate={picked.date} initTod={picked.tod} onHome={()=>setPicked(null)} onLogout={handleLogout}/>;
}

// ─── APP ────────────────────────────────────────────────────────
function App({onLogout,onHome,initDate,initTod}){
  const[screen,setScreen]=useState('attendance');
  const[date,setDate]=useState(()=>initDate||todayStr());
  // Scroll to top whenever tab or date changes
  useEffect(()=>{window.scrollTo({top:0,left:0,behavior:'instant'});},[screen,date]);
  const[tod,setTod]=useState(()=>initTod||currentTod());
  const[total,setTotal]=useState(()=>IP.filter(p=>p.active).length||127);
  const[totalManual,setTotalManual]=useState(false); // true = user overrode it
  const[duty,setDuty]=useState(0);
  const[extra,setExtra]=useState('');
  const[submitted,setSubmitted]=useState({P1:false,P2:false,HQ:false});
  const[markedBy,setMarkedBy]=useState({P1:'',P2:'',HQ:''});
  const[toast,setToast]=useState(null);
  const[toastKey,setToastKey]=useState(0);
  const[online,setOnline]=useState(true);
  const[personnel,setPersonnel]=useState(IP);
  const[records,setRecords]=useState({});
  const[history,setHistory]=useState([]);
  const[pdfPreview,setPdfPreview]=useState(null);
  const[pdfLoading,setPdfLoading]=useState(false);
  const[overrideUnlocked,setOverrideUnlocked]=useState(false);
  const[customSections,setCustomSections]=useState({P1:[],P2:[],HQ:[]});
  const skipRef=useRef(false);
  const personnelRef=useRef(IP);
  const totalManualRef=useRef(false);
  useEffect(()=>{personnelRef.current=personnel;},[personnel]);
  useEffect(()=>{totalManualRef.current=totalManual;},[totalManual]);
  // Online indicator
  useEffect(()=>{
    const ref=DB.ref('.info/connected');
    ref.on('value',snap=>setOnline(snap.val()===true));
    return()=>ref.off();
  },[]);
  // Personnel listener
  useEffect(()=>{
    const ref=DB.ref('jrn/personnel');
    ref.on('value',snap=>{
      const d=snap.val();
      if(d){
        skipRef.current=true;
        const ppl=Object.values(d).sort((a,b)=>a.id>b.id?1:-1);
        setPersonnel(ppl);
        if(!totalManualRef.current)setTotal(ppl.filter(p=>p.active).length);
        setTimeout(()=>{skipRef.current=false;},400);
      } else {
        const obj={};IP.forEach(p=>{obj[p.id]=p;});ref.set(obj);
      }
    });
    return()=>ref.off();
  },[]);
  // Attendance listener per date+tod
  useEffect(()=>{
    const ref=DB.ref(fbAttPath(date,tod));
    ref.on('value',snap=>{
      const d=snap.val();
      skipRef.current=true;
      if(d){
        setRecords(d.records||{});if(d.totalManual&&d.total){setTotal(d.total);setTotalManual(true);}setDuty(d.duty??0);
        setExtra(d.extra||'');setSubmitted(d.submitted||{P1:false,P2:false,HQ:false});
        setMarkedBy(d.markedBy||{P1:'',P2:'',HQ:''});
      } else {
        const nr={};
        personnelRef.current.filter(p=>p.active).forEach(p=>{
          // Auto-carry active date-range leaves (OL, LL, MC, HL etc.)
          const al=p.activeLeave;
          if(al&&al.det&&al.from&&date>=al.from&&date<=al.det){
            // On the last day at 2030/2230 they return — leave blank and clear the activeLeave
            if(date===al.det&&tod==='2030/2230'){
              DB.ref(`jrn/personnel/${p.id}/activeLeave`).remove();
            } else {
              nr[p.id]={s:al.s,det:al.det,from:al.from};return;
            }
          }
          // Auto-mark S/O for 2030/2230
          if(tod==='2030/2230'){
            const si=getSiso(p);
            if(si.type==='so')nr[p.id]={s:'so',det:'',from:''};
            else if(si.type==='so_till')nr[p.id]={s:'so_till',det:si.date||'',from:''};
          }
        });
        // For HLS: skip auto-carry if fewer than 10 pax would be marked
        // (guards against auto-filling HLS when the parade didn't happen that day)
        if(tod==='HLS'&&Object.keys(nr).length<10){
          Object.keys(nr).forEach(k=>delete nr[k]);
        }
        setRecords(nr);setSubmitted({P1:false,P2:false,HQ:false});setMarkedBy({P1:'',P2:'',HQ:''});
      }
      setTimeout(()=>{skipRef.current=false;},400);
    });
    return()=>ref.off();
  },[date,tod]);
  // Write attendance to Firebase
  useEffect(()=>{
    if(skipRef.current)return;
    DB.ref(fbAttPath(date,tod)).set({records,total,totalManual,duty,extra,submitted,markedBy});
  },[records,total,totalManual,duty,extra,date,tod,submitted,markedBy]);
  // History listener
  useEffect(()=>{
    const ref=DB.ref('jrn/history');
    ref.on('value',snap=>{
      const d=snap.val();
      setHistory(d?Object.values(d).sort((a,b)=>b.date.localeCompare(a.date)):[]);
    });
    return()=>ref.off();
  },[]);
  // Custom sections listener
  useEffect(()=>{
    const ref=DB.ref('jrn/sections');
    ref.on('value',snap=>{
      const d=snap.val();
      setCustomSections(d||{P1:[],P2:[],HQ:[]});
    });
    return()=>ref.off();
  },[]);
  function addCustomSection(plt,sec){
    if(!sec||!sec.trim())return;
    const current=(customSections[plt]||[]);
    if(current.includes(sec))return;
    const updated={...customSections,[plt]:[...current,sec]};
    DB.ref('jrn/sections').set(updated);
  }
  // Auto-create a blank history record for the current date if none exists
  useEffect(()=>{
    const ref=DB.ref(`jrn/history/${date}`);
    ref.once('value',snap=>{
      if(!snap.exists()){
        ref.set({date,savedAt:Date.now(),total});
      }
    });
  },[date]);
  // Update history record when a platoon submits
  function saveToHistory(){
    DB.ref(`jrn/history/${date}`).update({savedAt:Date.now(),total});
  }
  // Load all TODs for a date and show PDF preview
  async function loadDayAndPreview(dateStr,setLoadingFn){
    if(setLoadingFn)setLoadingFn(dateStr); else setPdfLoading(true);
    try{
      const allTodRecs={};
      const allTodMarkedBy={};  // {tod: {P1, P2, HQ}}
      let pTotalManual=false;
      let pTotal=personnel.filter(p=>p.active).length;
      await Promise.all(TODS.map(async tod=>{
        const snap=await DB.ref(fbAttPath(dateStr,tod)).once('value');
        const d=snap.val();
        allTodRecs[tod]=d?(d.records||{}):{};
        if(d){
          if(d.totalManual&&d.total){pTotal=d.total;pTotalManual=true;}
          if(d.markedBy)allTodMarkedBy[tod]=d.markedBy;
        }
      }));
      setPdfPreview({date:dateStr,allTodRecs,total:pTotal,allTodMarkedBy});
    }catch(e){alert('Failed to load data.');}
    finally{if(setLoadingFn)setLoadingFn(null); else setPdfLoading(false);}
  }
  function onPdfDownloaded(){
    DB.ref(`jrn/history/${pdfPreview.date}`).set({date:pdfPreview.date,savedAt:Date.now(),total:pdfPreview.total});
    toast_('✓ Saved to History');
  }
  function deleteHistory(dateStr){DB.ref(`jrn/history/${dateStr}`).remove();}
  // Personnel write wrapper (called from ManageScreen)
  function setPersonnelAndSync(updater){
    setPersonnel(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      const obj={};next.forEach(p=>{obj[p.id]=p;});
      DB.ref('jrn/personnel').set(obj);
      return next;
    });
  }
  function setRec(id,s,det,from){setRecords(p=>({...p,[id]:{s,det:det||'',from:from||''}}))}
  function setPersonLeave(id,s,from,till){
    // update personnel activeLeave for auto-carry
    setPersonnelAndSync(prev=>prev.map(p=>p.id===id?{...p,activeLeave:till?{s,from:from||todayStr(),det:till}:null}:p));
  }
  function toast_(msg,dur=3000){setToast(msg);setToastKey(k=>k+1);setTimeout(()=>setToast(null),dur)}
  function setAllPresent(){
    const nr={};
    personnel.filter(p=>p.active).forEach(p=>{nr[p.id]={s:'present',det:''}});
    setRecords(nr);toast_('✓ All set to Present');
  }
  function clearAll(plt,submittedState){
    const pltPpl=personnel.filter(p=>p.active&&p.plt===plt);
    if(submittedState[plt]){return;}
    setRecords(prev=>{
      const next={...prev};
      pltPpl.forEach(p=>{delete next[p.id];});
      return next;
    });
    toast_(`Cleared ${P_LABEL[plt]} statuses`);
  }
  const unassigned=useMemo(()=>personnel.filter(p=>p.active&&(!records[p.id]||!records[p.id].s)).length,[personnel,records]);
  const sisoExpiredCnt=useMemo(()=>personnel.filter(p=>p.active&&sisoExpired(p)).length,[personnel]);
  const msg=useMemo(()=>genMsg(date,tod,total,records,personnel,extra),[date,tod,total,records,personnel,extra]);
  return(
    <div className="app">
      <div className="hdr">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div className="hdr-title">JRN Parade State</div>
            <div className="hdr-sub">Jurong Node &nbsp;·&nbsp; <span style={{color:online?'#4ade80':'#f87171',fontWeight:800}}>{online?'● Live':'● Offline'}</span></div>
          </div>
          <button onClick={onLogout} style={{background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.2)',color:'#fff',borderRadius:'8px',padding:'6px 12px',fontSize:'12px',fontWeight:700,cursor:'pointer',flexShrink:0}}>
            Sign Out
          </button>
        </div>
      </div>
      <div className="datebar" style={{padding:'10px 14px 10px',display:'flex',alignItems:'center',gap:'10px'}}>
        <button onClick={onHome} style={{background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:'8px',padding:'6px 10px',fontSize:'12px',fontWeight:700,color:'#475569',cursor:'pointer',flexShrink:0}}>‹ Change</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:'11px',color:'#64748b',fontWeight:600}}>{new Date(date+'T00:00:00').toLocaleDateString('en-MY',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</div>
          <div style={{fontSize:'15px',fontWeight:800,color:'#0d9488',marginTop:'1px'}}>{TOD_LABEL[tod]} — {TOD_FULL[tod]}</div>
        </div>
      </div>
      <div className="main">
        {screen==='attendance'&&<AttendanceScreen date={date} tod={tod} personnel={personnel} records={records} setRec={setRec} setPersonLeave={setPersonLeave} setAllPresent={setAllPresent} clearAll={clearAll} submitted={submitted} setSubmitted={setSubmitted} markedBy={markedBy} setMarkedBy={setMarkedBy} toast_={toast_} overrideUnlocked={overrideUnlocked} onPlatoonSubmit={saveToHistory}/>}
        {screen==='telegram'&&<GenerateScreen msg={msg} total={total} setTotal={setTotal} totalManual={totalManual} setTotalManual={setTotalManual} autoTotal={personnel.filter(p=>p.active).length} extra={extra} setExtra={setExtra} toast_={toast_} date={date}/>}
        {screen==='manage'&&<ManageScreen personnel={personnel} setPersonnel={setPersonnelAndSync} toast_={toast_} customSections={customSections} addCustomSection={addCustomSection}/>}
        {screen==='history'&&<HistoryScreen history={history} personnel={personnel} onPreview={(e,setL)=>loadDayAndPreview(e.date,setL)} onDelete={deleteHistory} overrideUnlocked={overrideUnlocked} setOverrideUnlocked={setOverrideUnlocked} toast_={toast_} onEdit={dateStr=>{setDate(dateStr);setScreen('attendance');}}/>}
      </div>
      <nav className="bnav">
        {[
          {k:'attendance',icon:'📋',lbl:'Attendance',badge:unassigned>0?unassigned:null},
          {k:'telegram',icon:'📤',lbl:'Telegram'},
          {k:'history',icon:'🗂️',lbl:'History',badge:history.length>0?null:null},
          {k:'manage',icon:'👥',lbl:'Personnel',badge:sisoExpiredCnt>0?sisoExpiredCnt:null},
        ].map(t=>(
          <button key={t.k} className={`ntab${screen===t.k?' on':''}`} onClick={()=>setScreen(t.k)}>
            {t.badge&&<span className="nbadge">{t.badge}</span>}
            <span className="ntab-icon">{t.icon}</span>
            <span>{t.lbl}</span>
          </button>
        ))}
      </nav>
      {toast&&<div key={toastKey} className="toast">{toast}</div>}
      {pdfPreview&&<PDFPreviewModal date={pdfPreview.date} personnel={personnel} allTodRecs={pdfPreview.allTodRecs} total={pdfPreview.total} allTodMarkedBy={pdfPreview.allTodMarkedBy||{}} onClose={()=>setPdfPreview(null)} onDownloaded={onPdfDownloaded}/>}
    </div>
  );
}

// ─── ATTENDANCE SCREEN ──────────────────────────────────────────
function AttendanceScreen({date,tod,personnel,records,setRec,setPersonLeave,setAllPresent,clearAll,submitted,setSubmitted,markedBy,setMarkedBy,toast_,overrideUnlocked,onPlatoonSubmit}){
  const[search,setSearch]=useState('');
  const[plt,setPlt]=useState('P1');
  const active=personnel.filter(p=>p.active);
  const expiredSiso=active.filter(p=>sisoExpired(p));
  const filtered=active.filter(p=>{
    const q=search.toLowerCase();
    if(q)return p.name.toLowerCase().includes(q)||p.rank.toLowerCase().includes(q)||(p.dn&&p.dn.toLowerCase().includes(q));
    return p.plt===plt;
  });
  // Group: plt → sec → people
  const tree={};
  filtered.forEach(p=>{
    if(!tree[p.plt])tree[p.plt]={};
    if(!tree[p.plt][p.sec])tree[p.plt][p.sec]=[];
    tree[p.plt][p.sec].push(p);
  });
  const presentCnt=active.filter(p=>records[p.id]&&records[p.id].s==='present').length;
  const assignedCnt=active.filter(p=>records[p.id]&&records[p.id].s).length;
  const unCnt=active.length-assignedCnt;
  const pltColors={P1:'#dbeafe',P2:'#d1fae5',HQ:'#fef3c7'};
  return(
    <div>
      {expiredSiso.length>0&&(
        <div className="alert-banner">
          <div className="alert-banner-title">⚠ {expiredSiso.length} S/O Till Date Reached — Update Required</div>
          {expiredSiso.map(p=><div key={p.id} className="alert-banner-item">• {dispName(p)} — {sisoLabel(p)}</div>)}
        </div>
      )}
      <div className="stats-grid">
        <div className="stat-box"><div className="stat-n">{active.length}</div><div className="stat-l">Total</div></div>
        <div className="stat-box"><div className="stat-n" style={{color:'#16a34a'}}>{presentCnt}</div><div className="stat-l">Present</div></div>
        <div className="stat-box"><div className="stat-n" style={{color:unCnt>0?'#f59e0b':'#16a34a'}}>{unCnt}</div><div className="stat-l">Unassigned</div></div>
      </div>
      {(()=>{const isPastDate=date<todayStr();const isLocked=(submitted[plt]||false)||(isPastDate&&!overrideUnlocked);return(
        <button className="qbtn qbtn-r" style={{width:'100%',marginBottom:'10px',opacity:isLocked?.4:1,cursor:isLocked?'not-allowed':'pointer'}}
          onClick={()=>!isLocked&&clearAll(plt,submitted)}>
          ✕ Clear {P_LABEL[plt]||plt} Statuses{isLocked?' (Locked)':''}
        </button>
      );})()}
      <input className="search-inp" placeholder="🔍  Search name or rank..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <div className="ftabs" style={{paddingBottom:0,marginBottom:'12px'}}>
        {['P1','P2','HQ'].map(p=>(
          <button key={p} className={`ftab${plt===p?' on':''}`} style={{flex:1,textAlign:'center'}} onClick={()=>setPlt(p)}>
            {p==='HQ'?'HQ':P_LABEL[p]}
          </button>
        ))}
      </div>
      {PLATOONS.filter(p=>tree[p]).map(p=>{
        const isPastDate=date<todayStr();
        const isLocked=(submitted[p]||false)||(isPastDate&&!overrideUnlocked);
        return(
        <div key={p} style={isLocked?{opacity:.65,pointerEvents:'none',filter:'grayscale(40%)'}:{}}>
          {[...new Set([...(P_SECTIONS[p]||[]),...Object.keys(tree[p]||{})])].filter(s=>tree[p]&&tree[p][s]&&tree[p][s].length>0).map(s=>{
            const secPpl=tree[p][s];
            const filled=secPpl.filter(person=>records[person.id]?.s).length;
            const total=secPpl.length;
            const pct=Math.round((filled/total)*100);
            const done=filled===total;
            return(
              <div key={s} className="card">
                <div className="card-hdr-row" style={{borderLeft:`4px solid ${p==='P1'?'#0d9488':p==='P2'?'#16a34a':'#d97706'}`}}>
                  <span className="card-hdr-txt">{P_LABEL[p]} — {s}</span>
                  <span className={`card-hdr-cnt${done?' all-done':''}`}>{done?`✓ ${total}/${total}`:`${filled}/${total}`}</span>
                </div>
                <div className="sec-prog"><div className={`sec-prog-fill${done?' complete':''}`} style={{width:`${pct}%`}}/></div>
                <div className="card-body">
                  {secPpl.map(person=>(
                    <PersonRow key={person.id} person={person} record={records[person.id]||{}} setRec={setRec} setPersonLeave={setPersonLeave} tod={tod} locked={isLocked} currentDate={date}/>
                  ))}
                </div>
              </div>
            );
          })}
          {!search&&(
            <div style={{pointerEvents:'auto',opacity:1,filter:'none'}}>
              <PlatoonFooter plt={p} allPersonnel={active} records={records} pltColors={pltColors}
                submitted={submitted} setSubmitted={setSubmitted} markedBy={markedBy} setMarkedBy={setMarkedBy} toast_={toast_}
                date={date} overrideUnlocked={overrideUnlocked} onSubmit={onPlatoonSubmit}/>
            </div>
          )}
        </div>
        );
      })}
    </div>
  );
}

// ─── PLATOON FOOTER ─────────────────────────────────────────────
const OVERRIDE_PASS='Transport1409$';
function PlatoonFooter({plt,allPersonnel,records,pltColors,submitted,setSubmitted,markedBy,setMarkedBy,toast_,date,overrideUnlocked,onSubmit}){
  const pltPersonnel=allPersonnel.filter(p=>p.plt===plt);
  const unassignedList=pltPersonnel.filter(p=>!records[p.id]||!records[p.id].s);
  const NON_CMDR=new Set(['REC','PTE','LCP','CPL','CFC']);
  const commanders=allPersonnel.filter(p=>!NON_CMDR.has(p.rank));
  const marker=markedBy[plt]||'';
  const isSubmitted=submitted[plt]||false;
  const markerPerson=commanders.find(c=>c.id===marker);
  const accentColor=plt==='P1'?'#0d9488':plt==='P2'?'#16a34a':'#d97706';
  const isPastDate=date<todayStr();
  const canEdit=!isPastDate||overrideUnlocked;

  function handleSubmit(){
    if(!marker){toast_('⚠ Please select your name before submitting');return;}
    if(unassignedList.length>0){
      const names=unassignedList.slice(0,3).map(p=>`${p.rank} ${p.dn||p.name.split(' ')[0]}`).join(', ');
      const more=unassignedList.length>3?` +${unassignedList.length-3} more`:'';
      toast_(`⚠ ${unassignedList.length} not marked: ${names}${more}`);return;
    }
    setSubmitted(s=>({...s,[plt]:true}));
    toast_(`✓ ${P_LABEL[plt]} submitted`);
    if(onSubmit)onSubmit();
  }
  function handleEdit(){
    if(!canEdit){
      toast_('🔒 Past records locked. Enter override password in the History tab.',4000);return;
    }
    setSubmitted(s=>({...s,[plt]:false}));
  }

  return(
    <div className="card" style={{marginBottom:'16px',border:`2px solid ${isSubmitted?'#bbf7d0':'#e2e8f0'}`}}>
      <div style={{padding:'10px 14px',background:isSubmitted?'#f0fdf4':'#f8fafc',borderBottom:`2px solid ${isSubmitted?'#bbf7d0':'#e2e8f0'}`,display:'flex',alignItems:'center',gap:'8px'}}>
        <div style={{width:'8px',height:'8px',borderRadius:'50%',background:isSubmitted?'#16a34a':unassignedList.length===0?'#f59e0b':'#e2e8f0',flexShrink:0}}/>
        <span style={{fontSize:'11px',fontWeight:800,color:'#475569',textTransform:'uppercase',letterSpacing:'.6px',flex:1}}>{P_LABEL[plt]} — Sign-off</span>
        {isPastDate&&overrideUnlocked&&<span style={{fontSize:'10px',fontWeight:700,color:'#7c3aed',background:'#f3e8ff',padding:'2px 7px',borderRadius:'8px'}}>🔓 Override</span>}
        {isPastDate&&!overrideUnlocked&&<span style={{fontSize:'10px',color:'#94a3b8'}}>🔒 Past date</span>}
        {!isPastDate&&unassignedList.length>0&&!isSubmitted&&<span style={{fontSize:'11px',fontWeight:700,color:'#ef4444'}}>{unassignedList.length} unmarked</span>}
        {!isPastDate&&unassignedList.length===0&&!isSubmitted&&<span style={{fontSize:'11px',fontWeight:700,color:'#16a34a'}}>All marked ✓</span>}
      </div>
      <div className="plt-footer">
        <div>
          <div className="label">Signed off by</div>
          <select value={marker} onChange={e=>setMarkedBy(m=>({...m,[plt]:e.target.value}))} disabled={isSubmitted}
            style={{borderColor:!marker&&!isSubmitted?'#fcd34d':'',background:!marker&&!isSubmitted?'#fffbeb':''}}>
            <option value="">— Select your name —</option>
            {commanders.map(c=><option key={c.id} value={c.id}>{c.rank} {c.dn||c.name.split(' ')[0]}</option>)}
          </select>
        </div>
        {isSubmitted?(
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <div className="submit-btn submit-btn-done" style={{flex:1,textAlign:'center',padding:'12px'}}>
              ✓ Signed off — {markerPerson?`${markerPerson.rank} ${markerPerson.dn||markerPerson.name.split(' ')[0]}`:''}
            </div>
            <button className="btn-cancel" style={{padding:'12px 14px',borderRadius:'10px',opacity:canEdit?1:.5}} onClick={handleEdit}>✏ Edit</button>
          </div>
        ):(
          <button className="submit-btn submit-btn-active" onClick={handleSubmit} style={{background:accentColor}}>
            Save &amp; Submit {P_LABEL[plt]} Attendance
          </button>
        )}
      </div>
    </div>
  );
}

// ─── PERSON ROW ─────────────────────────────────────────────────
function PersonRow({person,record,setRec,setPersonLeave,tod,locked,currentDate}){
  const[showMore,setShowMore]=useState(false);
  const si=record.s?SM[record.s]:null;
  const colorClass=record.s?`sc-${record.s}`:'';
  const pltClass={P1:'plt-p1',P2:'plt-p2',HQ:'plt-hq'}[person.plt]||'';
  const expired=sisoExpired(person);
  const isPresent=record.s==='present';
  const isSO=record.s==='so'||record.s==='so_till';
  const showSO=tod==='2030/2230';

  function quickSet(s){
    if(locked)return;
    setRec(person.id,s,'','');
    // clear activeLeave if switching away from a date-range status
    if(SM[s]&&!SM[s].datePick&&person.activeLeave)setPersonLeave(person.id,null,null,null);
    setShowMore(false);
  }
  function handleStatusChange(newS){
    if(locked)return;
    setRec(person.id,newS,'','');
    if(SM[newS]&&!SM[newS].datePick&&person.activeLeave)setPersonLeave(person.id,null,null,null);
    if(newS)setShowMore(false);
  }
  function handleTillDate(till){
    setRec(person.id,record.s,till,record.from||currentDate);
    setPersonLeave(person.id,record.s,record.from||currentDate,till);
  }
  function handleFromDate(from){
    setRec(person.id,record.s,record.det||'',from);
    if(record.det)setPersonLeave(person.id,record.s,from,record.det);
  }

  // Display summary for locked date-pick statuses
  function dateSummary(){
    if(!si?.datePick)return null;
    const from=record.from;
    const till=record.det;
    if(!till)return null;
    if(si.dateRange&&from&&from!==till)return `${fmtDetDate(from)} → ${fmtDetDate(till)}`;
    return `Till ${fmtDetDate(till)}`;
  }

  return(
    <div className={`prow ${colorClass}${expired?' siso-row-alert':''}${record.s?' has-status':''}`}>
      <div className="prow-top">
        <div className="prow-name">{person.rank} {person.name}</div>
        <div style={{display:'flex',alignItems:'center',gap:'6px',flexShrink:0}}>
          {person.phone&&(
            <a href={`tel:${person.phone}`} style={{fontSize:'12px',color:'#0d9488',fontWeight:700,textDecoration:'none',background:'#f0fdfa',border:'1px solid #99f6e4',borderRadius:'6px',padding:'2px 7px',whiteSpace:'nowrap'}}
              onClick={e=>e.stopPropagation()}>
              📞 {person.phone}
            </a>
          )}
          <span className={sisoBadgeClass(person)}>{sisoLabel(person)}</span>
        </div>
      </div>
      <div className="prow-meta">
        <span className={`prow-plt ${pltClass}`}>{person.plt}</span>
      </div>

      {record.s?(
        <div className="prow-cur">
          <div style={{display:'flex',flexDirection:'column',flex:1,gap:'2px'}}>
            <span className="prow-cur-chip">{si?.l||record.s}</span>
            {dateSummary()&&<span style={{fontSize:'11px',color:'#0f766e',fontWeight:600,paddingLeft:'2px'}}>{dateSummary()}</span>}
          </div>
          {!locked&&<button className="prow-clear-btn" onClick={()=>quickSet('')}>✕</button>}
        </div>
      ):(
        <div className="prow-unassigned">⚠ Not assigned yet</div>
      )}

      {!locked&&(
        <>
          <div className="prow-quick">
            <button className={`pq${isPresent?' pq-on-g':''}`} onClick={()=>quickSet('present')}>✓ Present</button>
            {showSO&&<button className={`pq${isSO?' pq-on-y':''}`} onClick={()=>quickSet('so')}>S/O</button>}
            <button className={`pq${showMore?' pq-on-b':''}`} onClick={()=>setShowMore(v=>!v)}>
              {showMore?'▲ Less':'▾ More'}
            </button>
          </div>
          {showMore&&(
            <select value={record.s||''} onChange={e=>handleStatusChange(e.target.value)}>
              <option value="">— Select a status —</option>
              {SL.map(s=><option key={s.k} value={s.k}>{s.l}</option>)}
            </select>
          )}

          {/* Date picker for date-based statuses */}
          {si&&si.datePick&&(
            <div className="dpick-wrap">
              {si.dateRange&&(
                <div className="dpick-row">
                  <span className="dpick-lbl">From</span>
                  <input type="date" className="dpick-inp" value={record.from||currentDate||''}
                    min={currentDate} onChange={e=>handleFromDate(e.target.value)}/>
                </div>
              )}
              <div className="dpick-row">
                <span className="dpick-lbl">Till</span>
                <input type="date" className="dpick-inp" value={record.det||''}
                  min={record.from||currentDate} onChange={e=>handleTillDate(e.target.value)}/>
              </div>
              {record.det&&(
                <div className="dpick-autocarry">
                  ↻ Auto-carries daily until {fmtDetDate(record.det)}
                </div>
              )}
            </div>
          )}

          {/* Text input for non-date detail statuses */}
          {si&&si.d&&!si.datePick&&(
            <input type="text" placeholder={si.dp||'Enter details...'} value={record.det||''} onChange={e=>setRec(person.id,record.s,e.target.value,record.from||'')}/>
          )}
        </>
      )}
    </div>
  );
}

// ─── GENERATE SCREEN ────────────────────────────────────────────
function GenerateScreen({msg,total,setTotal,totalManual,setTotalManual,autoTotal,extra,setExtra,toast_,date}){
  const[copied,setCopied]=useState(false);
  function copy(){
    const go=text=>{
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(()=>{toast_('✓ Copied! Paste in Telegram');setCopied(true);setTimeout(()=>setCopied(false),2000)});
      } else {
        const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';
        document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);
        toast_('✓ Copied!');setCopied(true);setTimeout(()=>setCopied(false),2000);
      }
    };
    go(msg);
  }
  return(
    <div>
      <div className="card" style={{padding:'14px'}}>
        <div style={{marginBottom:'10px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'4px'}}>
            <div className="label" style={{marginBottom:0}}>Total Node Strength</div>
            <span style={{fontSize:'11px',color:'#94a3b8'}}>Auto: {autoTotal} pax</span>
          </div>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <input type="number" value={total} min={0}
              onChange={e=>{setTotal(Number(e.target.value));setTotalManual(true);}}
              style={{flex:1}}/>
            {totalManual&&(
              <button onClick={()=>{setTotal(autoTotal);setTotalManual(false);}}
                style={{padding:'8px 12px',background:'#f1f5f9',border:'1.5px solid #e2e8f0',borderRadius:'8px',fontSize:'12px',fontWeight:700,color:'#64748b',cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
                Reset to auto
              </button>
            )}
          </div>
          {totalManual&&<div style={{fontSize:'11px',color:'#f59e0b',fontWeight:600,marginTop:'4px'}}>⚠ Manual override active</div>}
        </div>
        <div className="label">Additional notes (appended at end)</div>
        <textarea value={extra} onChange={e=>setExtra(e.target.value)} rows={3} placeholder="e.g. extra remarks..." style={{resize:'vertical'}}/>
      </div>
      <div className="card" style={{padding:'14px'}}>
        <div className="label" style={{marginBottom:'8px'}}>Message Preview</div>
        <div className="msg-box">{msg}</div>
        <button className="copy-btn" onClick={copy} style={{background:copied?'#16a34a':undefined}}>
          {copied?'✓ Copied!':'📋 Copy Message for Telegram'}
        </button>
      </div>
    </div>
  );
}

// ─── MANAGE SCREEN ──────────────────────────────────────────────
function ManageScreen({personnel,setPersonnel,toast_,customSections,addCustomSection}){
  const[showAdd,setShowAdd]=useState(false);
  const[confirm,setConfirm]=useState(null);
  const[editId,setEditId]=useState(null);
  const[editData,setEditData]=useState({});
  const[filterPlt,setFilterPlt]=useState('ALL');
  const[np,setNp]=useState({rank:'PTE',name:'',dn:'',plt:'P1',sec:'BASE',siso:{type:'si'}});
  const[newSecInput,setNewSecInput]=useState('');
  const[addingNewSec,setAddingNewSec]=useState(false);
  const[editSecInput,setEditSecInput]=useState('');
  const[addingNewSecEdit,setAddingNewSecEdit]=useState(false);
  // All known sections = hardcoded defaults + Firebase custom sections + any used in personnel
  function sectionsFor(plt){
    const base=P_SECTIONS[plt]||[];
    const custom=(customSections&&customSections[plt])||[];
    const fromPpl=[...new Set(personnel.filter(p=>p.plt===plt).map(p=>p.sec))];
    return [...new Set([...base,...custom,...fromPpl])];
  }
  function confirmNewSec(val){
    if(!val.trim())return;
    setNp(prev=>({...prev,sec:val.trim()}));
    addCustomSection(np.plt,val.trim());
    setNewSecInput('');setAddingNewSec(false);
  }
  function confirmNewSecEdit(val){
    if(!val.trim())return;
    setEditData(prev=>({...prev,sec:val.trim()}));
    addCustomSection(editData.plt,val.trim());
    setEditSecInput('');setAddingNewSecEdit(false);
  }
  const active=personnel.filter(p=>p.active&&(filterPlt==='ALL'||p.plt===filterPlt));
  const inactive=personnel.filter(p=>!p.active);
  function add(){
    if(!np.name.trim()){toast_('Enter a name');return}
    if(!np.sec||np.sec==='__new__'){toast_('Enter a section name');return}
    const p={id:`p${Date.now()}`,rank:np.rank,name:np.name.toUpperCase().trim(),dn:np.dn.toUpperCase().trim()||np.name.toUpperCase().trim().split(' ')[0],plt:np.plt,sec:np.sec,siso:np.siso||{type:'si'},active:true};
    setPersonnel(prev=>[...prev,p]);setNp({rank:'PTE',name:'',dn:'',plt:'P1',sec:'BASE',siso:{type:'si'}});setNewSecInput('');setAddingNewSec(false);setShowAdd(false);toast_('✓ Personnel added');
  }
  function deactivate(id){setPersonnel(prev=>prev.map(p=>p.id===id?{...p,active:false}:p));setConfirm(null);toast_('Removed from roster')}
  function restore(id){setPersonnel(prev=>prev.map(p=>p.id===id?{...p,active:true}:p));toast_('✓ Restored')}
  function startEdit(p){setEditId(p.id);setEditData({rank:p.rank,name:p.name,dn:p.dn||'',plt:p.plt,sec:p.sec,siso:p.siso||{type:'si'},phone:p.phone||''});setAddingNewSecEdit(false);setEditSecInput('');}
  function saveEdit(id){
    setPersonnel(prev=>prev.map(p=>p.id===id?{...p,...editData,name:editData.name.toUpperCase().trim(),dn:editData.dn.toUpperCase().trim()||editData.name.toUpperCase().trim().split(' ')[0]}:p));
    setEditId(null);setEditSecInput('');setAddingNewSecEdit(false);toast_('✓ Updated');
  }
  // Group active by plt → sec
  const tree={};
  active.forEach(p=>{if(!tree[p.plt])tree[p.plt]={};if(!tree[p.plt][p.sec])tree[p.plt][p.sec]=[];tree[p.plt][p.sec].push(p)});
  const pltColors={P1:'#dbeafe',P2:'#d1fae5',HQ:'#fef3c7'};
  return(
    <div>
      <button className="sbtn" onClick={()=>setShowAdd(v=>!v)}>{showAdd?'✕ Cancel':'+ Add New Personnel'}</button>
      {showAdd&&(
        <div className="card" style={{marginBottom:'12px'}}>
          <div className="card-hdr">New Personnel</div>
          <div className="add-form">
            <div className="add-2col">
              <div><div className="label">Rank</div>
                <select value={np.rank} onChange={e=>setNp({...np,rank:e.target.value})}>
                  {RANKS.map(r=><option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              <div><div className="label">Platoon</div>
                <select value={np.plt} onChange={e=>{const secs=sectionsFor(e.target.value);setNp({...np,plt:e.target.value,sec:secs[0]||''});setNewSecInput('');setAddingNewSec(false);}}>
                  {PLATOONS.map(p=><option key={p} value={p}>{P_LABEL[p]}</option>)}
                </select>
              </div>
            </div>
            <div><div className="label">Section</div>
              {addingNewSec?(
                <div>
                  <input type="text" placeholder="New section name (e.g. SIGNALS)" value={newSecInput}
                    onChange={e=>setNewSecInput(e.target.value.toUpperCase())}
                    onKeyDown={e=>{if(e.key==='Enter')confirmNewSec(newSecInput);if(e.key==='Escape'){setAddingNewSec(false);setNewSecInput('');}}}
                    autoFocus style={{marginBottom:'6px'}}/>
                  <div style={{display:'flex',gap:'6px'}}>
                    <button className="btn-save" style={{flex:1}} onClick={()=>confirmNewSec(newSecInput)}>✓ Create "{newSecInput||'…'}"</button>
                    <button className="btn-cancel" onClick={()=>{setAddingNewSec(false);setNewSecInput('');}}>✕</button>
                  </div>
                </div>
              ):(
                <>
                  <select value={np.sec} onChange={e=>{if(e.target.value==='__other__'){setAddingNewSec(true);setNewSecInput('');}else setNp({...np,sec:e.target.value});}}>
                    {sectionsFor(np.plt).map(s=><option key={s} value={s}>{s}</option>)}
                    <option value="__other__">Other (create new)…</option>
                  </select>
                  {np.sec&&!sectionsFor(np.plt).includes(np.sec)&&<div style={{fontSize:'11px',color:'#0d9488',marginTop:'3px'}}>Custom section: {np.sec}</div>}
                </>
              )}
            </div>
            <div><div className="label">Full Name</div>
              <input type="text" placeholder="e.g. TAN AH KOW" value={np.name} onChange={e=>setNp({...np,name:e.target.value})}/>
            </div>
            <div><div className="label">Short name for Telegram</div>
              <input type="text" placeholder="e.g. AH KOW" value={np.dn} onChange={e=>setNp({...np,dn:e.target.value})}/>
            </div>
            <div className="add-2col">
              <div><div className="label">Strength Status</div>
                <select value={np.siso.type} onChange={e=>setNp({...np,siso:e.target.value==='so_till'?{type:'so_till',date:''}:{type:e.target.value}})}>
                  <option value="si">S/I (Stay In)</option>
                  <option value="so">S/O (Stay Out)</option>
                  <option value="so_till">S/O Till Date</option>
                </select>
                {np.siso.type==='so_till'&&<input type="date" value={np.siso.date||''} onChange={e=>setNp({...np,siso:{type:'so_till',date:e.target.value}})} style={{marginTop:'6px'}}/>}
              </div>
              <div><div className="label">Phone Number</div>
                <input type="tel" placeholder="e.g. 91234567" value={np.phone||''} onChange={e=>setNp({...np,phone:e.target.value.trim()})}/>
              </div>
            </div>
            <button className="sbtn" style={{margin:0}} onClick={add}>Add Personnel</button>
          </div>
        </div>
      )}
      <div className="ftabs" style={{marginBottom:'8px'}}>
        {['ALL','P1','P2','HQ'].map(p=>(
          <button key={p} className={`ftab${filterPlt===p?' on':''}`} onClick={()=>setFilterPlt(p)}>
            {p==='ALL'?`All (${personnel.filter(x=>x.active).length})`:p==='HQ'?`HQ (${personnel.filter(x=>x.active&&x.plt==='HQ').length})`:`${P_LABEL[p]} (${personnel.filter(x=>x.active&&x.plt===p).length})`}
          </button>
        ))}
      </div>
      <div className="card">
        <div className="card-hdr">Active Roster</div>
        {PLATOONS.filter(p=>tree[p]).map(p=>(
          <div key={p}>
            {[...new Set([...(P_SECTIONS[p]||[]),...Object.keys(tree[p]||{})])].filter(s=>tree[p]&&tree[p][s]&&tree[p][s].length>0).map(s=>(
              <div key={s}>
                <div className="sec-sep" style={{background:pltColors[p]}}>{P_LABEL[p]} — {s} ({tree[p][s].length})</div>
                {tree[p][s].map(person=>(
                  <div key={person.id}>
                    {editId===person.id?(
                      <div className="edit-form">
                        <div className="add-2col">
                          <div><div className="label">Rank</div>
                            <select value={editData.rank} onChange={e=>setEditData({...editData,rank:e.target.value})}>
                              {RANKS.map(r=><option key={r}>{r}</option>)}
                            </select>
                          </div>
                          <div><div className="label">Platoon</div>
                            <select value={editData.plt} onChange={e=>setEditData({...editData,plt:e.target.value})}>
                              {PLATOONS.map(p=><option key={p} value={p}>{P_LABEL[p]}</option>)}
                            </select>
                          </div>
                        </div>
                        <div><div className="label">Section</div>
                          {addingNewSecEdit?(
                            <div>
                              <input type="text" placeholder="New section name" value={editSecInput}
                                onChange={e=>setEditSecInput(e.target.value.toUpperCase())}
                                onKeyDown={e=>{if(e.key==='Enter')confirmNewSecEdit(editSecInput);if(e.key==='Escape'){setAddingNewSecEdit(false);setEditSecInput('');}}}
                                autoFocus style={{marginBottom:'6px'}}/>
                              <div style={{display:'flex',gap:'6px'}}>
                                <button className="btn-save" style={{flex:1}} onClick={()=>confirmNewSecEdit(editSecInput)}>✓ Create "{editSecInput||'…'}"</button>
                                <button className="btn-cancel" onClick={()=>{setAddingNewSecEdit(false);setEditSecInput('');}}>✕</button>
                              </div>
                            </div>
                          ):(
                            <>
                              <select value={editData.sec} onChange={e=>{if(e.target.value==='__other__'){setAddingNewSecEdit(true);setEditSecInput('');}else setEditData({...editData,sec:e.target.value});}}>
                                {sectionsFor(editData.plt).map(s=><option key={s}>{s}</option>)}
                                <option value="__other__">Other (create new)…</option>
                              </select>
                              {editData.sec&&!sectionsFor(editData.plt).includes(editData.sec)&&<div style={{fontSize:'11px',color:'#0d9488',marginTop:'3px'}}>Custom section: {editData.sec}</div>}
                            </>
                          )}
                        </div>
                        <input type="text" value={editData.name} onChange={e=>setEditData({...editData,name:e.target.value})} placeholder="Full name"/>
                        <input type="text" value={editData.dn} onChange={e=>setEditData({...editData,dn:e.target.value})} placeholder="Short name"/>
                        <div className="add-2col">
                          <div><div className="label">Strength Status</div>
                            <select value={(editData.siso||{type:'si'}).type} onChange={e=>setEditData({...editData,siso:e.target.value==='so_till'?{type:'so_till',date:(editData.siso||{}).date||''}:{type:e.target.value}})}>
                              <option value="si">S/I (Stay In)</option>
                              <option value="so">S/O (Stay Out)</option>
                              <option value="so_till">S/O Till Date</option>
                            </select>
                            {(editData.siso||{}).type==='so_till'&&<input type="date" value={(editData.siso||{}).date||''} onChange={e=>setEditData({...editData,siso:{type:'so_till',date:e.target.value}})} style={{marginTop:'6px'}}/>}
                          </div>
                          <div><div className="label">Phone Number</div>
                            <input type="tel" placeholder="e.g. 91234567" value={editData.phone||''} onChange={e=>setEditData({...editData,phone:e.target.value.trim()})}/>
                          </div>
                        </div>
                        <div className="btn-row">
                          <button className="btn-save" onClick={()=>saveEdit(person.id)}>Save</button>
                          <button className="btn-cancel" onClick={()=>setEditId(null)}>Cancel</button>
                        </div>
                      </div>
                    ):(
                      <div className="mrow">
                        <div className="mrow-info">
                          <div className="mrow-name">{person.rank} {person.name} <span className={sisoBadgeClass(person)} style={{marginLeft:'4px'}}>{sisoLabel(person)}</span></div>
                          <div className="mrow-sub">Msg: {person.dn}</div>
                        </div>
                        <div style={{display:'flex',gap:'5px',flexShrink:0}}>
                          <button className="ebtn" onClick={()=>startEdit(person)}>Edit</button>
                          {confirm===person.id?(
                            <><button className="conf-yes" onClick={()=>deactivate(person.id)}>Yes</button>
                            <button className="conf-no" onClick={()=>setConfirm(null)}>No</button></>
                          ):(
                            <button className="dbtn" onClick={()=>setConfirm(person.id)}>Remove</button>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            ))}
          </div>
        ))}
      </div>
      {inactive.length>0&&(
        <div className="card">
          <div className="card-hdr" style={{color:'#94a3b8'}}>Archived ({inactive.length})</div>
          {inactive.map(p=>(
            <div key={p.id} className="mrow" style={{opacity:.65}}>
              <div className="mrow-info">
                <div className="mrow-name">{p.rank} {p.name}</div>
                <div className="mrow-sub">{P_LABEL[p.plt]||p.plt} — {p.sec}</div>
              </div>
              <button className="rbtn" onClick={()=>restore(p.id)}>Restore</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
