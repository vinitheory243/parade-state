    const dateStr=new Date(date+'T00:00:00').toLocaleDateString('en-SG',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
    // Header
    doc.setFillColor(15,148,136);doc.rect(0,0,W,22,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(255,255,255);
    doc.text('JRN BUDDY SYSTEM',W/2,10,{align:'center'});
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    doc.text(dateStr,W/2,17,{align:'center'});
    const pltColors={P1:[13,148,136],P2:[22,163,74],HQ:[217,119,6]};
    const pltLabels={P1:'PLATOON 1',P2:'PLATOON 2',HQ:'HQ'};
    const colW=(W-margin*2-6)/2;
    const pageH=297;
    const headerH=22,subH=9,bottomMargin=10;
    // Exactly one page per platoon — scale row height to always fit
    PLT_ORDER.forEach((plt,pltIdx)=>{
      if(pltIdx>0)doc.addPage();
      // Page header
      doc.setFillColor(...pltColors[plt]);doc.rect(0,0,W,headerH,'F');
      doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(255,255,255);
      doc.text('JRN BUDDY SYSTEM',W/2,10,{align:'center'});
      doc.setFontSize(9);doc.setFont('helvetica','normal');
      doc.text(`${pltLabels[plt]}  ·  ${dateStr}`,W/2,17,{align:'center'});
      y=headerH+2;
      const gs=groups[plt]||[];
      const pltCount=personnelOnDate(personnel,date).filter(p=>p.plt===plt).length;
      // Sub-header
      doc.setFillColor(248,250,252);doc.rect(margin,y,W-margin*2,subH,'F');
      doc.setDrawColor(...pltColors[plt]);doc.rect(margin,y,W-margin*2,subH,'S');
      doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...pltColors[plt]);
      doc.text(`${pltCount} personnel  |  ${gs.length} buddy group${gs.length!==1?'s':''}`,margin+3,y+5.8);
      y+=subH+2;
      if(!gs.length)return;
      // Calculate row height to fit all pairs on this page
      const availH=pageH-y-bottomMargin;
      const numRows=Math.ceil(gs.length/2);
      const hasTrio=gs.some(g=>g.length===3);
      const minRowH=hasTrio?22:17;
      const rowH=Math.max(minRowH,Math.min(25,availH/numRows));
      const boxH=rowH-2;
      // Fixed text offsets (absolute mm within box)
      const LABEL_OFF=4,NAME_START=9,NAME_STEP=4.5;
      // Buddy pairs in 2 columns
      gs.forEach((grp,idx)=>{
        const col=idx%2;
        const x=margin+col*(colW+6);
        const bY=y+Math.floor(idx/2)*rowH;
        const isTrio=grp.length===3;
        const thisBoxH=isTrio?Math.max(boxH,20):boxH;
        doc.setFillColor(248,250,252);doc.roundedRect(x,bY,colW,thisBoxH,.5,.5,'F');
        doc.setDrawColor(...pltColors[plt]);doc.setLineWidth(.3);doc.roundedRect(x,bY,colW,thisBoxH,.5,.5,'S');
        doc.setFont('helvetica','bold');doc.setFontSize(6.5);doc.setTextColor(...pltColors[plt]);
        doc.text(`B${idx+1}${isTrio?' (TRIO)':''}`,x+2,bY+LABEL_OFF);
        doc.setFont('helvetica','normal');doc.setTextColor(15,23,42);doc.setFontSize(7);
        grp.forEach((p,pi)=>{doc.text(`• ${dn(p)}`,x+2,bY+NAME_START+pi*NAME_STEP);});
      });
    });
    doc.save(`JRN_BuddySystem_${date}.pdf`);
  }
  function copyAsText(){
    const dateStr=new Date(date+'T00:00:00').toLocaleDateString('en-SG',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
    const pltLabels={HQ:'HQ',P1:'PLATOON 1',P2:'PLATOON 2'};
    const parts=PLT_ORDER.map(plt=>{
      const gs=groups[plt];
      if(!gs||!gs.length)return null;
      const header=`JRN BUDDY SYSTEM ${pltLabels[plt]} · ${dateStr}`;
      const body=gs.map((grp,idx)=>{
        const label=`B${idx+1}${grp.length===3?' (TRIO)':''}`;
        const names=grp.map(p=>`• ${dn(p)}`).join('\n');
        return `${label}\n${names}`;
      }).join('\n');
      return `${header}\n${body}`;
    }).filter(Boolean);
    const text=parts.join('\n\n-----\n\n');
    navigator.clipboard.writeText(text).then(()=>toast_('✓ Copied to clipboard')).catch(()=>toast_('Copy failed'));
  }
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:9000,display:'flex',flexDirection:'column'}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:'0 0 18px 18px',padding:'16px 14px 16px',boxShadow:'0 8px 32px rgba(0,0,0,.18)',maxHeight:'88vh',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px'}}>
          <span style={{fontSize:'20px'}}>👥</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:'16px',color:'#0f172a'}}>Buddy System</div>
            <div style={{fontSize:'12px',color:'#64748b',marginTop:'1px'}}>Paired in parade state order</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:'20px',color:'#94a3b8',cursor:'pointer',padding:'0 4px',lineHeight:1}}>✕</button>
        </div>
        {/* Platoon groups */}
        <div style={{overflowY:'auto',flex:1,marginBottom:'12px'}}>
          {PLT_ORDER.map(plt=>{
            const gs=groups[plt];
            if(!gs||!gs.length)return null;
            const color=PLT_COLOR[plt];const bg=PLT_BG[plt];
            return(
              <div key={plt} style={{marginBottom:'16px'}}>
                <div style={{fontSize:'11px',fontWeight:800,color,textTransform:'uppercase',letterSpacing:'.6px',marginBottom:'8px',paddingLeft:'2px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span>{P_LABEL[plt]} — {personnelOnDate(personnel,date).filter(p=>p.plt===plt).length} pax</span>
                  <span style={{fontWeight:600,fontSize:'10px',opacity:.7}}>{gs.length} groups</span>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                  {gs.map((grp,idx)=>(
                    <div key={idx} style={{background:bg,border:`1.5px solid ${color}33`,borderRadius:'10px',padding:'10px 14px',display:'flex',alignItems:'flex-start',gap:'12px'}}>
                      <span style={{fontSize:'12px',fontWeight:800,color,minWidth:'32px',paddingTop:'1px'}}>B{idx+1}{grp.length===3?'*':''}</span>
                      <div style={{flex:1}}>
                        {grp.map(p=>(
                          <div key={p.id} style={{fontSize:'13px',fontWeight:600,color:'#0f172a',lineHeight:1.5}}>• {p.rank} {p.name}</div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
        {/* Actions */}
        <div style={{display:'flex',gap:'8px'}}>
          <button onClick={downloadPDF} style={{flex:1,padding:'12px',background:'#0d9488',color:'#fff',border:'none',borderRadius:'12px',fontSize:'13px',fontWeight:800,cursor:'pointer'}}>⬇ Download PDF</button>
          <button onClick={copyAsText} style={{flex:1,padding:'12px',background:'#334155',color:'#fff',border:'none',borderRadius:'12px',fontSize:'13px',fontWeight:800,cursor:'pointer'}}>📋 Copy as Text</button>
        </div>
      </div>
    </div>
  );
}

// ─── NR HISTORY SCREEN ──────────────────────────────────────────
function NRHistoryScreen({nrHistory,personnel,overrideUnlocked,setOverrideUnlocked,toast_,isAdmin,currentDate,currentEventKey}){
  const[loadingKey,setLoadingKey]=useState(null);
  const[nrPreview,setNrPreview]=useState(null); // {eventName,date,records,total}
  const today=todayStr();
  // Group by date
  const byDate={};
  nrHistory.forEach(e=>{if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  async function handlePreview(entry){
    setLoadingKey(entry.eventKey);
    try{
      const snap=await DB.ref(`jrn/nr/${entry.date}/${entry.eventKey}`).once('value');
      const d=snap.val()||{};
      setNrPreview({eventName:entry.eventName,date:entry.date,records:d.records||{},total:entry.total});
    }catch(e){alert('Failed to load.');}
    finally{setLoadingKey(null);}
  }
  function handleDelete(entry){
    DB.ref(`jrn/nr/${entry.date}/${entry.eventKey}`).remove();
    toast_('Deleted');
  }
  function unlockOverride(){
    const pw=window.prompt('Enter override password:');
    if(pw==='Transport1409$'){setOverrideUnlocked(true);toast_('🔓 Override active');}
    else if(pw!==null)toast_('⚠ Wrong password');
  }
  return(
    <div style={{padding:'14px'}}>
      <div style={{fontWeight:800,fontSize:'16px',color:'#0f172a',marginBottom:'4px'}}>📋 Nominal Roll History</div>
      <div style={{fontSize:'12px',color:'#64748b',marginBottom:'16px'}}>Past nominal roll attendance records.</div>
      {!overrideUnlocked&&(
        <button onClick={unlockOverride} style={{background:'#f3e8ff',color:'#7c3aed',border:'1px solid #ddd6fe',borderRadius:'8px',padding:'7px 13px',fontSize:'12px',fontWeight:700,cursor:'pointer',marginBottom:'14px'}}>🔓 Override Past Records</button>
      )}
      {dates.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:'#94a3b8',fontSize:'15px'}}>No nominal roll records yet.</div>}
      {dates.map(dt=>{
        const entries=byDate[dt];
        const isPast=dt<today;
        const canEdit=!isPast||overrideUnlocked||isAdmin;
        const multipleOnDay=entries.length>1;
        return(
          <div key={dt} className="card" style={{marginBottom:'12px'}}>
            <div className="card-hdr" style={{display:'flex',alignItems:'center',gap:'8px'}}>
              <span style={{flex:1}}>{new Date(dt+'T00:00:00').toLocaleDateString('en-MY',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</span>
              {isPast&&!canEdit&&<span style={{fontSize:'11px',color:'#94a3b8'}}>🔒</span>}
              {isPast&&canEdit&&overrideUnlocked&&<span style={{fontSize:'10px',fontWeight:700,color:'#7c3aed',background:'#f3e8ff',padding:'2px 7px',borderRadius:'8px'}}>🔓</span>}
            </div>
            {entries.map((entry,i)=>(
              <div key={entry.eventKey} style={{padding:'10px 14px',borderTop:i>0?'1px solid #f1f5f9':'none',display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                {multipleOnDay&&<div style={{width:'8px',height:'8px',borderRadius:'50%',background:'#ea580c',flexShrink:0}}/>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:'14px',color:'#0f172a'}}>{entry.eventName}</div>
                  <div style={{fontSize:'11px',color:'#64748b',marginTop:'2px'}}>
                    {entry.eventName} CAA {fmtTeleDate(entry.date)} &nbsp;·&nbsp; {entry.total} pax
                  </div>
                </div>
                <div style={{display:'flex',gap:'6px',flexShrink:0}}>
                  <button className="hist-prev-btn" onClick={()=>handlePreview(entry)} disabled={loadingKey===entry.eventKey}>
                    {loadingKey===entry.eventKey?'Loading…':'Preview'}
                  </button>
                  {isAdmin&&<button className="hist-del-btn" onClick={()=>{if(window.confirm(`Delete "${entry.eventName}"?`))handleDelete(entry);}}>Delete</button>}
                </div>
              </div>
            ))}
          </div>
        );
      })}
      {nrPreview&&<NominalRollPreviewModal date={nrPreview.date} eventName={nrPreview.eventName} personnel={personnel} records={nrPreview.records} total={nrPreview.total} onClose={()=>setNrPreview(null)}/>}
    </div>
  );
}

// ─── ATTENDANCE SCREEN ──────────────────────────────────────────
function AttendanceScreen({date,tod,personnel,records,setRec,setPersonLeave,setPersonDailyDuty,setAllPresent,clearAll,submitted,setSubmitted,markedBy,setMarkedBy,toast_,overrideUnlocked,onPlatoonSubmit,otherReasons,addOtherReason,deleteOtherReason,jumpTo,onJumpDone,isNR}){
  const[search,setSearch]=useState('');
  const[plt,setPlt]=useState('P1');
  const[confirmClear,setConfirmClear]=useState(null); // null or plt key
  const[tempUnlocked,setTempUnlocked]=useState(null); // person id temporarily unlocked via search
  const[highlightIds,setHighlightIds]=useState(new Set()); // IDs of unmarked pax highlighted after failed submit
  // Once a highlighted person gets marked, remove them so clearing later doesn't re-highlight
  useEffect(()=>{
    if(!highlightIds.size)return;
    const toRemove=[...highlightIds].filter(id=>records[id]?.s);
    if(!toRemove.length)return;
    setHighlightIds(prev=>{const n=new Set(prev);toRemove.forEach(id=>n.delete(id));return n;});
  },[records]);
  useEffect(()=>{
    if(!jumpTo)return;
    setPlt(jumpTo.plt);
    setSearch('');
    setTempUnlocked(jumpTo.id);
    setTimeout(()=>{
      const el=document.getElementById(`pr-${jumpTo.id}`);
      if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
    },120);
    if(onJumpDone)onJumpDone();
  },[jumpTo]);
  const active=personnelOnDate(personnel,date);
  const expiredSiso=active.filter(p=>sisoExpired(p));
  const filtered=active.filter(p=>{
    const q=search.toLowerCase();
    if(q){
      const rec=records[p.id];
      const statusKey=(rec&&rec.s)||'';
      const statusLbl=SM[statusKey]?SM[statusKey].l.toLowerCase():'';
      const det=(rec&&rec.det||'').toLowerCase();
      return p.name.toLowerCase().includes(q)||p.rank.toLowerCase().includes(q)||(p.dn&&p.dn.toLowerCase().includes(q))||statusKey.toLowerCase().includes(q)||statusLbl.includes(q)||det.includes(q);
    }
    return p.plt===plt;
  });
  // Group: plt → sec → people
  const tree={};
  filtered.forEach(p=>{
    if(!tree[p.plt])tree[p.plt]={};
    if(!tree[p.plt][p.sec])tree[p.plt][p.sec]=[];
    tree[p.plt][p.sec].push(p);
  });
  const presentCnt=active.filter(p=>records[p.id]&&records[p.id].s==='present').length;
  const assignedCnt=active.filter(p=>records[p.id]&&records[p.id].s).length;
  const unCnt=active.length-assignedCnt;
  const pltColors={P1:'#dbeafe',P2:'#d1fae5',HQ:'#fef3c7'};
  return(
    <div>
      {expiredSiso.length>0&&(
        <div className="alert-banner">
          <div className="alert-banner-title">⚠ {expiredSiso.length} S/O Till Date Reached — Update Required</div>
          {expiredSiso.map(p=><div key={p.id} className="alert-banner-item">• {dispName(p)} — {sisoLabel(p)}</div>)}
        </div>
      )}
      <div className="stats-grid">
        <div className="stat-box"><div className="stat-n">{active.length}</div><div className="stat-l">Total</div></div>
        <div className="stat-box"><div className="stat-n" style={{color:'#16a34a'}}>{presentCnt}</div><div className="stat-l">Present</div></div>
        <div className="stat-box"><div className="stat-n" style={{color:unCnt>0?'#f59e0b':'#16a34a'}}>{unCnt}</div><div className="stat-l">Unassigned</div></div>
      </div>
      {(()=>{const isPastDate=date<todayStr();const isLocked=(submitted[plt]||false)||(isPastDate&&!overrideUnlocked);return confirmClear===plt?(
        <div style={{display:'flex',gap:'8px',marginBottom:'10px',background:'#fef2f2',border:'1.5px solid #fca5a5',borderRadius:'10px',padding:'10px 12px',alignItems:'center'}}>
          <span style={{flex:1,fontSize:'13px',fontWeight:700,color:'#991b1b'}}>Clear all {P_LABEL[plt]||plt} statuses?</span>
          <button className="conf-yes" onClick={()=>{setConfirmClear(null);clearAll(plt,submitted);}}>Clear</button>
          <button className="conf-no" onClick={()=>setConfirmClear(null)}>Cancel</button>
        </div>
      ):(
        <button className="qbtn qbtn-r" style={{width:'100%',marginBottom:'10px',opacity:isLocked?.4:1,cursor:isLocked?'not-allowed':'pointer'}}
          onClick={()=>!isLocked&&setConfirmClear(plt)}>
          ✕ Clear {P_LABEL[plt]||plt} Statuses{isLocked?' (Locked)':''}
        </button>
      );})()}
      <input className="search-inp" placeholder="🔍  Search name or rank..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <div className="ftabs" style={{paddingBottom:0,marginBottom:'12px'}}>
        {['P1','P2','HQ'].map(p=>(
          <button key={p} className={`ftab${plt===p?' on':''}`} style={{flex:1,textAlign:'center'}} onClick={()=>{setPlt(p);setConfirmClear(null);}}>
            {p==='HQ'?'HQ':P_LABEL[p]}
          </button>
        ))}
      </div>
      {PLATOONS.filter(p=>tree[p]).map(p=>{
        const isPastDate=date<todayStr();
        const isLocked=(submitted[p]||false)||(isPastDate&&!overrideUnlocked);
        return(
        <div key={p} style={isLocked?{opacity:.7}:{}}>
          {[...new Set([...(P_SECTIONS[p]||[]),...Object.keys(tree[p]||{})])].filter(s=>tree[p]&&tree[p][s]&&tree[p][s].length>0).map(s=>{
            const secPpl=tree[p][s];
            const filled=secPpl.filter(person=>records[person.id]?.s).length;
            const total=secPpl.length;
            const pct=Math.round((filled/total)*100);
            const done=filled===total;
            return(
              <div key={s} className="card">
                <div className="card-hdr-row" style={{borderLeft:`4px solid ${p==='P1'?'#0d9488':p==='P2'?'#16a34a':'#d97706'}`}}>
                  <span className="card-hdr-txt">{P_LABEL[p]} — {s}</span>
                  <span className={`card-hdr-cnt${done?' all-done':''}`}>{done?`✓ ${total}/${total}`:`${filled}/${total}`}</span>
                </div>
                <div className="sec-prog"><div className={`sec-prog-fill${done?' complete':''}`} style={{width:`${pct}%`}}/></div>
                <div className="card-body">
                  {secPpl.map(person=>(
                    <PersonRow key={person.id} person={person} record={records[person.id]||{}} setRec={setRec} setPersonLeave={setPersonLeave} setPersonDailyDuty={setPersonDailyDuty} tod={tod} locked={isLocked&&tempUnlocked!==person.id} currentDate={date} otherReasons={otherReasons} addOtherReason={addOtherReason} deleteOtherReason={deleteOtherReason} tempUnlocked={tempUnlocked===person.id} onLockBack={()=>setTempUnlocked(null)} isNR={isNR} highlighted={highlightIds.has(person.id)&&!records[person.id]?.s}/>
                  ))}
                </div>
              </div>
            );
          })}
          {!search&&(
            <div style={{pointerEvents:'auto',opacity:1,filter:'none'}}>
              <PlatoonFooter plt={p} allPersonnel={active} records={records} pltColors={pltColors}
                submitted={submitted} setSubmitted={setSubmitted} markedBy={markedBy} setMarkedBy={setMarkedBy} toast_={toast_}
                date={date} overrideUnlocked={overrideUnlocked} onSubmit={onPlatoonSubmit}
                onHighlight={ids=>setHighlightIds(new Set(ids))}/>
            </div>
          )}
        </div>
        );
      })}
    </div>
  );
}

// ─── PLATOON FOOTER ─────────────────────────────────────────────
const OVERRIDE_PASS='Transport1409$';
function PlatoonFooter({plt,allPersonnel,records,pltColors,submitted,setSubmitted,markedBy,setMarkedBy,toast_,date,overrideUnlocked,onSubmit,onHighlight}){
  const pltPersonnel=allPersonnel.filter(p=>p.plt===plt);
  const unassignedList=pltPersonnel.filter(p=>!records[p.id]||!records[p.id].s);
  const NON_CMDR=new Set(['REC','PTE','LCP','CPL','CFC']);
  const commanders=allPersonnel.filter(p=>!NON_CMDR.has(p.rank));
  const marker=markedBy[plt]||'';
  const isSubmitted=submitted[plt]||false;
  const markerPerson=commanders.find(c=>c.id===marker);
  const accentColor=plt==='P1'?'#0d9488':plt==='P2'?'#16a34a':'#d97706';
  const isPastDate=date<todayStr();
  const canEdit=!isPastDate||overrideUnlocked;

  function handleSubmit(){
    if(!marker){toast_('⚠ Please select your name before submitting');return;}
    if(unassignedList.length>0){
      const names=unassignedList.slice(0,3).map(p=>`${p.rank} ${p.dn||p.name.split(' ')[0]}`).join(', ');
      const more=unassignedList.length>3?` +${unassignedList.length-3} more`:'';
      toast_(`⚠ ${unassignedList.length} not marked: ${names}${more}`);
      if(onHighlight)onHighlight(unassignedList.map(p=>p.id));
      setTimeout(()=>{const el=document.getElementById(`pr-${unassignedList[0].id}`);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},80);
      return;
    }
    setSubmitted(s=>({...s,[plt]:true}));
    toast_(`✓ ${P_LABEL[plt]} submitted`);
    if(onSubmit)onSubmit();
  }
  function handleEdit(){
    if(!canEdit){
      toast_('🔒 Past records locked. Enter override password in the History tab.',4000);return;
    }
    setSubmitted(s=>({...s,[plt]:false}));
  }

  return(
    <div className="card" style={{marginBottom:'16px',border:`2px solid ${isSubmitted?'#bbf7d0':'#e2e8f0'}`}}>
      <div style={{padding:'10px 14px',background:isSubmitted?'#f0fdf4':'#f8fafc',borderBottom:`2px solid ${isSubmitted?'#bbf7d0':'#e2e8f0'}`,display:'flex',alignItems:'center',gap:'8px'}}>
        <div style={{width:'8px',height:'8px',borderRadius:'50%',background:isSubmitted?'#16a34a':unassignedList.length===0?'#f59e0b':'#e2e8f0',flexShrink:0}}/>
        <span style={{fontSize:'11px',fontWeight:800,color:'#475569',textTransform:'uppercase',letterSpacing:'.6px',flex:1}}>{P_LABEL[plt]} — Sign-off</span>
        {isPastDate&&overrideUnlocked&&<span style={{fontSize:'10px',fontWeight:700,color:'#7c3aed',background:'#f3e8ff',padding:'2px 7px',borderRadius:'8px'}}>🔓 Override</span>}
        {isPastDate&&!overrideUnlocked&&<span style={{fontSize:'10px',color:'#94a3b8'}}>🔒 Past date</span>}
        {!isPastDate&&unassignedList.length>0&&!isSubmitted&&<span style={{fontSize:'11px',fontWeight:700,color:'#ef4444'}}>{unassignedList.length} unmarked</span>}
        {!isPastDate&&unassignedList.length===0&&!isSubmitted&&<span style={{fontSize:'11px',fontWeight:700,color:'#16a34a'}}>All marked ✓</span>}
      </div>
      <div className="plt-footer">
        <div>
          <div className="label">Signed off by</div>
          <select value={marker} onChange={e=>setMarkedBy(m=>({...m,[plt]:e.target.value}))} disabled={isSubmitted}
            style={{borderColor:!marker&&!isSubmitted?'#fcd34d':'',background:!marker&&!isSubmitted?'#fffbeb':''}}>
            <option value="">— Select your name —</option>
            {commanders.map(c=><option key={c.id} value={c.id}>{c.rank} {c.dn||c.name.split(' ')[0]}</option>)}
          </select>
        </div>
        {isSubmitted?(
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <div className="submit-btn submit-btn-done" style={{flex:1,textAlign:'center',padding:'12px'}}>
              ✓ Signed off — {markerPerson?`${markerPerson.rank} ${markerPerson.dn||markerPerson.name.split(' ')[0]}`:''}
            </div>
            <button className="btn-cancel" style={{padding:'12px 14px',borderRadius:'10px',opacity:canEdit?1:.5}} onClick={handleEdit}>✏ Edit</button>
          </div>
        ):(
          <button className="submit-btn submit-btn-active" onClick={handleSubmit} style={{background:accentColor}}>
            Save &amp; Submit {P_LABEL[plt]} Attendance
          </button>
        )}
        <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} style={{width:'100%',padding:'9px',background:'#f1f5f9',color:'#475569',border:'1.5px solid #e2e8f0',borderRadius:'10px',fontSize:'13px',fontWeight:700,cursor:'pointer'}}>↑ Back to Top</button>
      </div>
    </div>
  );
}

// ─── PERSON ROW ─────────────────────────────────────────────────
function PersonRow({person,record,setRec,setPersonLeave,setPersonDailyDuty,tod,locked,currentDate,otherReasons,addOtherReason,deleteOtherReason,tempUnlocked,onLockBack,isNR,highlighted}){
  const[showMore,setShowMore]=useState(false);
  const si=record.s?SM[record.s]:null;
  const colorClass=record.s?`sc-${record.s}`:'';
  const pltClass={P1:'plt-p1',P2:'plt-p2',HQ:'plt-hq'}[person.plt]||'';
  const expired=sisoExpired(person);
  const isPresent=record.s==='present';
  const isSO=record.s==='so'||record.s==='so_till';
  const showSO=tod==='2030/2230';

  function quickSet(s){
    if(locked)return;
    const autoFrom=s&&SM[s]?.datePick&&SM[s]?.dateRange?currentDate:'';
    setRec(person.id,s,'',autoFrom);
    if(!isNR){
      if(!s){
        // Explicit clear — wipe carry sources so status doesn't snap back
        if(person.activeLeave)setPersonLeave(person.id,null,null,null);
        if(person.dailyDuty)setPersonDailyDuty(person.id,null,null);
      } else {
        // Always clear old activeLeave when switching status — new carry set when till date is entered
        if(person.activeLeave&&!SM[s]?.fromOnly)setPersonLeave(person.id,null,null,null);
        if(SM[s]?.fromOnly)setPersonLeave(person.id,s,currentDate,null);
        if(WHOLE_DAY_DUTY.has(s))setPersonDailyDuty(person.id,s,currentDate);
        else if(person.dailyDuty)setPersonDailyDuty(person.id,null,null);
      }
    }
    setShowMore(false);
  }
  function handleStatusChange(newS){
    if(locked)return;
    if(newS.startsWith('__or__')){
      const reason=newS.slice(6);
      setRec(person.id,'others',reason,'');
      if(!isNR&&person.dailyDuty)setPersonDailyDuty(person.id,null,null);
      setShowMore(false);
      return;
    }
    const autoFrom=newS&&SM[newS]?.datePick&&SM[newS]?.dateRange?currentDate:'';
    setRec(person.id,newS,'',autoFrom);
    if(!isNR){
      if(!newS){
        if(person.activeLeave)setPersonLeave(person.id,null,null,null);
        if(person.dailyDuty)setPersonDailyDuty(person.id,null,null);
      } else {
        // Always clear old activeLeave when switching status — new carry set when till date is entered
        if(person.activeLeave&&!SM[newS]?.fromOnly)setPersonLeave(person.id,null,null,null);
        if(SM[newS]?.fromOnly)setPersonLeave(person.id,newS,currentDate,null);
        if(WHOLE_DAY_DUTY.has(newS))setPersonDailyDuty(person.id,newS,currentDate);
        else if(person.dailyDuty)setPersonDailyDuty(person.id,null,null);
      }
    }
    if(newS)setShowMore(false);
  }
  function handleTillDate(till){
    setRec(person.id,record.s,till,record.from||currentDate);
    if(!isNR)setPersonLeave(person.id,record.s,record.from||currentDate,till);
  }
  function handleFromDate(from){
    setRec(person.id,record.s,record.det||'',from);
    if(!isNR){
      if(record.det)setPersonLeave(person.id,record.s,from,record.det);
      else if(SM[record.s]?.fromOnly)setPersonLeave(person.id,record.s,from,null);
    }
  }

  // Display summary for locked date-pick statuses
  function dateSummary(){
    if(!si?.datePick)return null;
    if(si.fromOnly)return record.from?`From ${fmtDetDate(record.from)} — ongoing`:'Ongoing';
    const from=record.from;
    const till=record.det;
    if(!till)return null;
    if(si.dateRange&&from&&from!==till)return `${fmtDetDate(from)} → ${fmtDetDate(till)}`;
    return `Till ${fmtDetDate(till)}`;
  }

  return(
    <div id={`pr-${person.id}`} className={`prow ${colorClass}${expired?' siso-row-alert':''}${record.s?' has-status':''}${tempUnlocked?' temp-unlock':''}${highlighted?' highlight-unmarked':''}`}>
      <div className="prow-top">
        <div className="prow-name">{person.rank} {person.name}</div>
        <div style={{display:'flex',alignItems:'center',gap:'6px',flexShrink:0}}>
          {person.phone&&(
            <a href={`tel:${person.phone}`} style={{fontSize:'12px',color:'#0d9488',fontWeight:700,textDecoration:'none',background:'#f0fdfa',border:'1px solid #99f6e4',borderRadius:'6px',padding:'2px 7px',whiteSpace:'nowrap'}}
              onClick={e=>e.stopPropagation()}>
              📞 Call
            </a>
          )}
          <span className={sisoBadgeClass(person)}>{sisoLabel(person)}</span>
        </div>
      </div>
      <div className="prow-meta">
        <span className={`prow-plt ${pltClass}`}>{person.plt}</span>
        {person.pes&&<span className="prow-pes">PES {person.pes}</span>}
      </div>

      {record.s?(
        <div className="prow-cur">
          <div style={{display:'flex',flexDirection:'column',flex:1,gap:'2px'}}>
            <span className="prow-cur-chip">{si?.l||record.s}</span>
            {dateSummary()&&<span style={{fontSize:'11px',color:'#0f766e',fontWeight:600,paddingLeft:'2px'}}>{dateSummary()}</span>}
          </div>
          {!locked&&<button className="prow-clear-btn" onClick={()=>quickSet('')}>✕</button>}
        </div>
      ):(
        <div className="prow-unassigned">⚠ Not assigned yet</div>
      )}

      {tempUnlocked&&(
        <div style={{display:'flex',alignItems:'center',gap:'8px',background:'#fef9c3',border:'1px solid #fde68a',borderRadius:'8px',padding:'6px 10px',marginBottom:'6px'}}>
          <span style={{fontSize:'12px',fontWeight:700,color:'#92400e',flex:1}}>🔓 Quick edit unlocked</span>
          <button onClick={onLockBack} style={{background:'#16a34a',color:'#fff',border:'none',borderRadius:'8px',padding:'5px 12px',fontSize:'13px',fontWeight:800,cursor:'pointer'}}>✓ Done</button>
        </div>
      )}
      {!locked&&(
        <>
          <div className="prow-quick">
            <button className={`pq${isPresent?' pq-on-g':''}`} onClick={()=>quickSet('present')}>✓ Present</button>
            {showSO&&<button className={`pq${isSO?' pq-on-y':''}`} onClick={()=>quickSet('so')}>S/O</button>}
            <button className={`pq${showMore?' pq-on-b':record.s&&!isPresent&&!isSO?' pq-on-y':''}`} onClick={()=>setShowMore(v=>!v)}>
              {showMore?'▲ Less':'▾ More'}
            </button>
          </div>
          {showMore&&(
            <select value={record.s==='others'&&record.det&&otherReasons&&otherReasons.includes(record.det)?`__or__${record.det}`:record.s||''} onChange={e=>handleStatusChange(e.target.value)}>
              <option value="">— Select a status —</option>
              {SL.filter(s=>s.k!=='so'&&s.k!=='so_till').map(s=><option key={s.k} value={s.k}>{s.l}</option>)}
              {otherReasons&&otherReasons.length>0&&<option disabled>──────────────</option>}
              {otherReasons&&otherReasons.map(r=><option key={`__or__${r}`} value={`__or__${r}`}>{r}</option>)}
            </select>
          )}

          {/* Date picker for date-based statuses */}
          {si&&si.datePick&&(
            <div className="dpick-wrap">
              {(si.dateRange||si.fromOnly)&&(
                <div className="dpick-row">
                  <span className="dpick-lbl">From</span>
                  <input type="date" className="dpick-inp" value={record.from||currentDate||''}
                    min={currentDate} onChange={e=>handleFromDate(e.target.value)}/>
                </div>
              )}
              {!si.fromOnly&&(
                <div className="dpick-row">
                  <span className="dpick-lbl">Till</span>
                  <input type="date" className="dpick-inp" value={record.det||''}
                    min={record.from||currentDate} onChange={e=>handleTillDate(e.target.value)}/>
                </div>
              )}
              {si.fromOnly&&record.from&&(
                <div className="dpick-autocarry">
                  ↻ Auto-carries every Parade State until marked Present
                </div>
              )}
              {!si.fromOnly&&record.det&&(
                <div className="dpick-autocarry">
                  ↻ Auto-carries daily until {fmtDetDate(record.det)}
                </div>
              )}
            </div>
          )}

          {/* Text input for non-date detail statuses */}
          {si&&si.d&&!si.datePick&&(
            <div>
              <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
                <input type="text" placeholder={si.dp||'Enter details...'} value={record.det||''}
                  onChange={e=>setRec(person.id,record.s,e.target.value,record.from||'')}
                  style={{flex:1}}/>
                {record.s==='others'&&record.det&&record.det.trim()&&(
                  <button
                    onClick={()=>addOtherReason&&addOtherReason(record.det.trim())}
                    title="Save as quick-pick"
                    style={{padding:'6px 12px',background:'#0d9488',color:'#fff',border:'none',borderRadius:'8px',fontSize:'13px',fontWeight:800,cursor:'pointer',flexShrink:0}}>
                    ✓
                  </button>
                )}
              </div>
              {deleteOtherReason&&record.s==='others'&&otherReasons&&otherReasons.length>0&&(
                <div style={{marginTop:'8px',padding:'8px 10px',background:'#fef2f2',border:'1px solid #fecaca',borderRadius:'8px'}}>
                  <div style={{fontSize:'11px',fontWeight:700,color:'#dc2626',marginBottom:'6px'}}>🗑 Admin — Delete quick-picks</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'5px'}}>
                    {otherReasons.map(r=>(
                      <div key={r} style={{display:'flex',alignItems:'center',gap:'4px',background:'#fff',border:'1px solid #fca5a5',borderRadius:'16px',padding:'2px 4px 2px 10px'}}>
                        <span style={{fontSize:'12px',fontWeight:600,color:'#1e293b'}}>{r}</span>
                        <button onClick={()=>deleteOtherReason(r)}
                          style={{background:'#dc2626',color:'#fff',border:'none',borderRadius:'50%',width:'18px',height:'18px',fontSize:'12px',fontWeight:800,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,lineHeight:1}}>×</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─── NR GENERATE SCREEN ─────────────────────────────────────────
function NRGenerateScreen({date,eventName,records,personnel,toast_}){
  const[copied,setCopied]=useState(false);

  function copy(){
    const go=text=>{
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(()=>{toast_('✓ Copied! Paste in Telegram');setCopied(true);setTimeout(()=>setCopied(false),2000)});
      }else{
        const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';
        document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);
        toast_('✓ Copied!');setCopied(true);setTimeout(()=>setCopied(false),2000);
      }
    };
    go(msg);
  }
  return(
    <div>
      <div className="card" style={{padding:'12px 14px',background:'#fff7ed',border:'1.5px solid #fed7aa'}}>

      </div>
      <div className="card" style={{padding:'14px'}}>
        <div className="label" style={{marginBottom:'8px'}}>Message Preview</div>
        <div className="msg-box">{msg}</div>
        <button className="copy-btn" onClick={copy} style={{background:copied?'#16a34a':'#ea580c'}}>
          {copied?'✓ Copied!':'📋 Copy NR Message for Telegram'}
        </button>
      </div>
    </div>
  );
}

// ─── CUSTOM REPORT MODAL ────────────────────────────────────────
function CustomReportModal({personnel,date,records,toast_,onClose}){
  const[reportTitle,setReportTitle]=useState('JRN CUSTOM REPORT');
  const[fPlt,setFPlt]=useState('ALL');
  const[fPes,setFPes]=useState('ALL');
  const[fStatus,setFStatus]=useState('ALL');
  const[fSiso,setFSiso]=useState('ALL');
  const[fldRank,setFldRank]=useState(true);
  const[fldPes,setFldPes]=useState(true);
  const[fldSec,setFldSec]=useState(false);
  const[fldStatus,setFldStatus]=useState(false);
  const[fldSiso,setFldSiso]=useState(false);
  const[fldPhone,setFldPhone]=useState(false);
  const pesOptions=useMemo(()=>{
    const vals=new Set(personnel.map(p=>p.pes||'').filter(Boolean));
    return[...PES_LIST.slice(1).filter(p=>vals.has(p)),...[...vals].filter(v=>!PES_LIST.includes(v))];
  },[personnel]);
  const statusOptions=useMemo(()=>{
    const keys=new Set();
    personnel.forEach(p=>{const r=records[p.id];if(r&&r.s)keys.add(r.s);});
    return[...[...keys].filter(s=>s!=='so')];
  },[personnel,records]);
  const filtered=useMemo(()=>personnel.filter(p=>{
    if(fPlt!=='ALL'&&p.plt!==fPlt)return false;
    if(fPes!=='ALL'&&(p.pes||'')!==fPes)return false;
    if(fSiso!=='ALL'){const si=getSiso(p);const isSO=si.type==='so'||si.type==='so_till';if(fSiso==='so'&&!isSO)return false;if(fSiso==='si'&&isSO)return false;}
    if(fStatus!=='ALL'){const rec=records[p.id];if(fStatus==='none'){if(rec&&rec.s)return false;}else{if(!rec||rec.s!==fStatus)return false;}}
    return true;
  }),[personnel,fPlt,fPes,fStatus,fSiso,records]);
  const dn=p=>`${fldRank?p.rank+' ':''}${p.dn||p.name.split(' ')[0]}`;
  function rowExtras(p){
    const rec=records[p.id];const parts=[];
    if(fldPes&&p.pes)parts.push(`PES ${p.pes}`);
    if(fldSec)parts.push(p.sec);
    if(fldStatus)parts.push(rec&&rec.s?(rec.s==='others'&&rec.det?`Others: ${rec.det}`:(SM[rec.s]?.l||rec.s)):'Not assigned');
    if(fldSiso)parts.push(sisoLabel(p));
    if(fldPhone&&p.phone)parts.push(p.phone);
    return parts;
  }
  function buildText(){
    const ds=new Date(date+'T00:00:00').toLocaleDateString('en-SG',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
    const fp=[];
    if(fPlt!=='ALL')fp.push(`Platoon: ${P_LABEL[fPlt]||fPlt}`);
    if(fPes!=='ALL')fp.push(`PES: ${fPes}`);
    if(fStatus!=='ALL')fp.push(`Status: ${fStatus==='none'?'Not assigned':(SM[fStatus]?.l||fStatus)}`);
    if(fSiso!=='ALL')fp.push(fSiso==='so'?'S/O only':'S/I only');
    const lines=[`${reportTitle||'JRN CUSTOM REPORT'} · ${ds}`];
    if(fp.length)lines.push(`[${fp.join(' | ')}]`);
    lines.push(`${filtered.length} personnel`,'');
    filtered.forEach((p,i)=>{const ex=rowExtras(p);lines.push(`${i+1}. ${dn(p)}${ex.length?' | '+ex.join(' | '):''}`);});
    return lines.join('\n');
  }
  function copyText(){navigator.clipboard.writeText(buildText()).then(()=>toast_('✓ Copied to clipboard')).catch(()=>{const ta=document.createElement('textarea');ta.value=buildText();document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast_('✓ Copied');});}
  async function downloadPDF(){
    await ensureJsPDF();
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,MG=14;
    const ds=new Date(date+'T00:00:00').toLocaleDateString('en-SG',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
    doc.setFillColor(15,23,42);doc.rect(0,0,W,22,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(255,255,255);
    doc.text((reportTitle||'JRN CUSTOM REPORT').toUpperCase(),W/2,9,{align:'center'});
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(ds,W/2,16,{align:'center'});
    let y=26;
    const fp=[];
    if(fPlt!=='ALL')fp.push(`Platoon: ${P_LABEL[fPlt]||fPlt}`);
    if(fPes!=='ALL')fp.push(`PES: ${fPes}`);
    if(fStatus!=='ALL')fp.push(`Status: ${fStatus==='none'?'Not assigned':(SM[fStatus]?.l||fStatus)}`);
    if(fSiso!=='ALL')fp.push(fSiso==='so'?'S/O only':'S/I only');
    if(fp.length){doc.setFontSize(8);doc.setFont('helvetica','italic');doc.setTextColor(100,116,139);doc.text(`Filters: ${fp.join('  |  ')}`,MG,y);y+=5;}
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(15,23,42);doc.text(`${filtered.length} personnel`,MG,y);y+=7;
    // Build columns
    const cols=[{k:'sn',l:'S/N',w:10}];
    if(fldRank)cols.push({k:'rank',l:'RANK',w:14});
    cols.push({k:'name',l:'NAME',w:0});
    if(fldPes)cols.push({k:'pes',l:'PES',w:14});
    if(fldSec)cols.push({k:'sec',l:'SECTION',w:28});
    if(fldStatus)cols.push({k:'status',l:'STATUS',w:28});
    if(fldSiso)cols.push({k:'siso',l:'S/I·S/O',w:18});
    if(fldPhone)cols.push({k:'phone',l:'PHONE',w:24});
    const TW=W-MG*2;const fixedW=cols.filter(c=>c.w).reduce((a,c)=>a+c.w,0);
    cols.find(c=>c.k==='name').w=TW-fixedW;
    // Header row
    doc.setFillColor(30,41,59);doc.rect(MG,y,TW,7,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(6.5);doc.setTextColor(255,255,255);
    let cx=MG;cols.forEach(c=>{doc.text(c.l,cx+2,y+4.8);cx+=c.w;});y+=7;
    // Data rows
    filtered.forEach((p,i)=>{
      if(y>278){doc.addPage();y=MG;}
      const rec=records[p.id];const rowH=6;
      if(i%2===0){doc.setFillColor(248,250,252);doc.rect(MG,y,TW,rowH,'F');}
      doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(15,23,42);
      cx=MG;
      cols.forEach(c=>{
        let v='';
        if(c.k==='sn')v=String(i+1);
        else if(c.k==='rank')v=p.rank;
        else if(c.k==='name')v=p.name;
        else if(c.k==='pes')v=p.pes?`PES ${p.pes}`:'';
        else if(c.k==='sec')v=p.sec;
        else if(c.k==='status')v=rec&&rec.s?(rec.s==='others'&&rec.det?`Others: ${rec.det}`:(SM[rec.s]?.l||rec.s)):'';
        else if(c.k==='siso')v=sisoLabel(p);
        else if(c.k==='phone')v=p.phone||'';
        // Clip to column width
        const maxW=c.w-3;const txt=doc.splitTextToSize(String(v),maxW)[0]||'';
        doc.text(txt,cx+2,y+4);cx+=c.w;
      });
      doc.setDrawColor(226,232,240);doc.setLineWidth(.2);doc.line(MG,y+rowH,MG+TW,y+rowH);
      y+=rowH;
    });
    const slug=(reportTitle||'CustomReport').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');

        <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'14px',flexShrink:0}}>

        <div style={{overflowY:'auto',flex:1,paddingBottom:'4px'}}>
          <div style={secLbl}>Report Title</div>

const BULK_FIELDS=[
  {k:'pes',    l:'PES Status',   hint:'e.g. A, B1, B2, C9…'},
  {k:'phone',  l:'Phone Number', hint:'e.g. 91234567'},
  {k:'dn',     l:'Nickname',     hint:'e.g. AH KOW (used in Telegram)'},
  {k:'rank',   l:'Rank',         hint:'e.g. PTE, CPL, 3SG…'},
  {k:'sec',    l:'Section',      hint:'e.g. BASE, CS/CSS…'},
];
function BulkImportModal({personnel,setPersonnel,toast_,onClose}){
  const[field,setField]=useState('pes');
  const[raw,setRaw]=useState('');
  const[preview,setPreview]=useState(null);
  const fDef=BULK_FIELDS.find(f=>f.k===field)||BULK_FIELDS[0];
  function normalize(s){return(s||'').toUpperCase().replace(/[^A-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim();}
  function score(a,b){const aw=a.split(' ');const bw=b.split(' ');return bw.filter(w=>w.length>1&&aw.includes(w)).length;}
  function findMatch(name){
    const n=normalize(name);let best=null,bestScore=0;
    personnel.forEach(p=>{
      const pn=normalize(p.name);
      if(pn===n){best=p;bestScore=999;return;}
      const s=score(n,pn)+score(pn,n);
      if(s>bestScore){bestScore=s;best=p;}
    });
    return bestScore>=2?{p:best,score:bestScore}:null;
  }
  function parse(){
    const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
    const results=[];
    lines.forEach(line=>{
      const parts=line.split(/\t/).map(p=>p.trim());
      let name='',val='';
      if(parts.length>=2){
        name=parts[0];val=parts.slice(1).join(' ').trim();
      } else {
        // comma split as fallback
        const ci=line.lastIndexOf(',');
        if(ci>0){name=line.slice(0,ci).trim();val=line.slice(ci+1).trim();}
        else{name=line;val='';}
      }
      if(!name)return;
      // Uppercase for certain fields
      if(field==='pes'||field==='rank'||field==='sec')val=val.toUpperCase();
      if(field==='dn')val=val.toUpperCase();
      const match=findMatch(name);
      results.push({rawLine:line,name,val,match});
    });
    setPreview(results);
  }
  function applyAll(){
    const toUpdate=preview.filter(r=>r.match&&r.val);
    if(!toUpdate.length){toast_('Nothing to apply');return;}
    setPersonnel(prev=>prev.map(p=>{
      const hit=toUpdate.find(r=>r.match.p.id===p.id);
      return hit?{...p,[field]:hit.val}:p;
    }));
    toast_(`✓ Updated ${fDef.l} for ${toUpdate.length} personnel`);
    onClose();
  }
  const matched=preview?preview.filter(r=>r.match&&r.val).length:0;
  const unmatched=preview?preview.filter(r=>!r.match||!r.val).length:0;
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:9000,display:'flex',flexDirection:'column'}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:'0 0 20px 20px',padding:'16px 14px 14px',boxShadow:'0 8px 32px rgba(0,0,0,.18)',maxHeight:'92vh',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px',flexShrink:0}}>
          <span style={{fontSize:'20px'}}>📥</span>
          <div style={{flex:1}}><div style={{fontWeight:800,fontSize:'16px',color:'#0f172a'}}>Bulk Import</div><div style={{fontSize:'12px',color:'#64748b'}}>Paste name + value from spreadsheet</div></div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:'20px',color:'#94a3b8',cursor:'pointer'}}>✕</button>
        </div>
        <div style={{overflowY:'auto',flex:1}}>
          {!preview&&(<>
            <div style={{fontSize:'11px',fontWeight:800,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.7px',marginBottom:'8px'}}>Field to update</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'7px',marginBottom:'14px'}}>
              {BULK_FIELDS.map(f=>(
                <button key={f.k} onClick={()=>{setField(f.k);setRaw('');}} style={{padding:'9px 10px',borderRadius:'9px',border:`2px solid ${field===f.k?'#7c3aed':'#e2e8f0'}`,background:field===f.k?'#faf5ff':'#f8fafc',color:field===f.k?'#7c3aed':'#64748b',fontWeight:700,fontSize:'13px',cursor:'pointer',textAlign:'left'}}>
                  {field===f.k?'✓ ':''}{f.l}
                </button>
              ))}
            </div>
            <div style={{fontSize:'12px',color:'#64748b',marginBottom:'8px',lineHeight:1.5}}>
              Paste two columns: <b>Full Name</b> (tab) <b>{fDef.l}</b>. One row per line.<br/>
              <span style={{fontFamily:'monospace',fontSize:'11px',background:'#f1f5f9',padding:'4px 8px',borderRadius:'6px',display:'inline-block',marginTop:'4px'}}>TAN HONG YU MOSES{'	'}{fDef.hint}<br/>SHANMUGA SUNDARAM SAI VISHWA{'	'}{fDef.hint}</span>
            </div>
            <textarea value={raw} onChange={e=>setRaw(e.target.value)} rows={10} placeholder="Paste here…" style={{resize:'vertical',fontFamily:'monospace',fontSize:'12px'}}/>
            <button onClick={parse} disabled={!raw.trim()} style={{width:'100%',marginTop:'10px',padding:'12px',background:raw.trim()?'#7c3aed':'#e2e8f0',color:raw.trim()?'#fff':'#94a3b8',border:'none',borderRadius:'12px',fontSize:'14px',fontWeight:800,cursor:raw.trim()?'pointer':'not-allowed'}}>
              Preview Matches →
            </button>
          </>)}
          {preview&&(<>
            <div style={{fontSize:'12px',fontWeight:700,color:'#7c3aed',marginBottom:'8px'}}>Updating: {fDef.l}</div>
            <div style={{display:'flex',gap:'8px',marginBottom:'10px'}}>
              <div style={{flex:1,background:'#f0fdf4',border:'1.5px solid #bbf7d0',borderRadius:'10px',padding:'8px 12px',textAlign:'center'}}>
                <div style={{fontSize:'18px',fontWeight:800,color:'#16a34a'}}>{matched}</div>
                <div style={{fontSize:'11px',color:'#15803d'}}>Ready to update</div>
              </div>
              <div style={{flex:1,background:'#fef2f2',border:'1.5px solid #fca5a5',borderRadius:'10px',padding:'8px 12px',textAlign:'center'}}>
                <div style={{fontSize:'18px',fontWeight:800,color:'#dc2626'}}>{unmatched}</div>
                <div style={{fontSize:'11px',color:'#b91c1c'}}>No match / no value</div>
              </div>
            </div>
            <div style={{maxHeight:'340px',overflowY:'auto',border:'1px solid #e2e8f0',borderRadius:'10px'}}>
              {preview.map((r,i)=>(
                <div key={i} style={{padding:'8px 12px',borderBottom:'1px solid #f1f5f9',background:r.match&&r.val?'#fff':'#fef9f9',display:'flex',alignItems:'center',gap:'8px'}}>
                  <span style={{fontSize:'15px'}}>{r.match&&r.val?'✅':'⚠️'}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:'12px',fontWeight:700,color:'#0f172a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.match?r.match.p.name:<span style={{color:'#dc2626'}}>{r.name}</span>}</div>
                    <div style={{fontSize:'11px',color:'#64748b'}}>{r.match?`${r.match.p.rank} · ${r.match.p.plt}`:r.rawLine}</div>
                  </div>
                  {r.val?<span style={{background:'#f3e8ff',color:'#7c3aed',fontWeight:800,fontSize:'12px',padding:'2px 8px',borderRadius:'8px',flexShrink:0,maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.val}</span>
                        :<span style={{color:'#dc2626',fontSize:'11px',flexShrink:0}}>No value</span>}
                </div>
              ))}
            </div>
            <button onClick={()=>setPreview(null)} style={{width:'100%',marginTop:'10px',padding:'10px',background:'#f1f5f9',color:'#475569',border:'none',borderRadius:'10px',fontSize:'13px',fontWeight:700,cursor:'pointer'}}>← Back to edit</button>
          </>)}
        </div>
        {preview&&matched>0&&(
          <div style={{paddingTop:'10px',borderTop:'1px solid #f1f5f9',flexShrink:0}}>
            <button onClick={applyAll} style={{width:'100%',padding:'12px',background:'#7c3aed',color:'#fff',border:'none',borderRadius:'12px',fontSize:'14px',fontWeight:800,cursor:'pointer'}}>
              ✓ Apply {matched} {fDef.l} updates
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

  const[confirm,setConfirm]=useState(null);
  const[editId,setEditId]=useState(null);
  const[editData,setEditData]=useState({});

  const[np,setNp]=useState({rank:'PTE',name:'',dn:'',plt:'P1',sec:'BASE',siso:{type:'si'},pes:''});
  const[newSecInput,setNewSecInput]=useState('');
  const[addingNewSec,setAddingNewSec]=useState(false);
  const[editSecInput,setEditSecInput]=useState('');
  const[addingNewSecEdit,setAddingNewSecEdit]=useState(false);
  const[showBulkPes,setShowBulkPes]=useState(false);
  // All known sections = hardcoded defaults + Firebase custom sections + any used in personnel
  function sectionsFor(plt){
    const base=P_SECTIONS[plt]||[];
    const custom=(customSections&&customSections[plt])||[];
    const fromPpl=[...new Set(personnel.filter(p=>p.plt===plt).map(p=>p.sec))];
    return [...new Set([...base,...custom,...fromPpl])];
  }
  function confirmNewSec(val){
    if(!val.trim())return;
    setNp(prev=>({...prev,sec:val.trim()}));
    addCustomSection(np.plt,val.trim());
    setNewSecInput('');setAddingNewSec(false);
  }
  function confirmNewSecEdit(val){
    if(!val.trim())return;
    setEditData(prev=>({...prev,sec:val.trim()}));
    addCustomSection(editData.plt,val.trim());
    setEditSecInput('');setAddingNewSecEdit(false);
  }
  const active=personnel.filter(p=>p.active&&(filterPlt==='ALL'||p.plt===filterPlt));
  const ARCHIVE_DAYS=10;
  const inactive=personnel.filter(p=>{
    if(p.active)return false;
    if(!p.removedDate)return false; // legacy with no removedDate: don't show
    const diff=Math.floor((new Date(todayStr())-new Date(p.removedDate))/(1000*60*60*24));
    return diff<ARCHIVE_DAYS;
  });
  function add(){
    if(!np.name.trim()){toast_('Enter a name');return}
    if(!np.sec||np.sec==='__new__'){toast_('Enter a section name');return}
    const rawPes=(np.pes||'').replace(/^OTHER:/,'').trim();
    const p={id:`p${Date.now()}`,rank:np.rank,name:np.name.toUpperCase().trim(),dn:np.dn.toUpperCase().trim()||np.name.toUpperCase().trim().split(' ')[0],plt:np.plt,sec:np.sec,siso:np.siso||{type:'si'},pes:rawPes,active:true,joinDate:todayStr()};
    setPersonnel(prev=>[...prev,p]);setNp({rank:'PTE',name:'',dn:'',plt:'P1',sec:'BASE',siso:{type:'si'},pes:''});setNewSecInput('');setAddingNewSec(false);setShowAdd(false);toast_('✓ Personnel added');
  }
  function deactivate(id){setPersonnel(prev=>prev.map(p=>p.id===id?{...p,active:false,removedDate:todayStr()}:p));setConfirm(null);toast_('Removed from roster')}
  function restore(id){setPersonnel(prev=>prev.map(p=>p.id===id?{...p,active:true,removedDate:null}:p));toast_('✓ Restored')}
  function startEdit(p){setEditId(p.id);setEditData({rank:p.rank,name:p.name,dn:p.dn||'',plt:p.plt,sec:p.sec,siso:p.siso||{type:'si'},phone:p.phone||'',pes:p.pes||''});setAddingNewSecEdit(false);setEditSecInput('');}
  function saveEdit(id){
    const rawPes=(editData.pes||'').replace(/^OTHER:/,'').trim();
    setPersonnel(prev=>prev.map(p=>p.id===id?{...p,...editData,name:editData.name.toUpperCase().trim(),dn:editData.dn.toUpperCase().trim()||editData.name.toUpperCase().trim().split(' ')[0],pes:rawPes}:p));
    setEditId(null);setEditSecInput('');setAddingNewSecEdit(false);toast_('✓ Updated');
  }
  // Group active by plt → sec
  const tree={};
  active.forEach(p=>{if(!tree[p.plt])tree[p.plt]={};if(!tree[p.plt][p.sec])tree[p.plt][p.sec]=[];tree[p.plt][p.sec].push(p)});
  const pltColors={P1:'#dbeafe',P2:'#d1fae5',HQ:'#fef3c7'};
  return(
    <div>
      <div style={{display:'flex',gap:'8px',marginBottom:'4px'}}>
        <button className="sbtn" style={{flex:1,margin:0}} onClick={()=>setShowAdd(v=>!v)}>{showAdd?'✕ Cancel':'+ Add New Personnel'}</button>
        {isAdmin&&<button className="sbtn" style={{flex:1,margin:0,background:'#7c3aed'}} onClick={()=>setShowBulkPes(true)}>📥 Bulk Import</button>}
      </div>
      {showBulkPes&&<BulkImportModal personnel={personnel} setPersonnel={setPersonnel} toast_={toast_} onClose={()=>setShowBulkPes(false)}/>}
      {showAdd&&(
        <div className="card" style={{marginBottom:'12px'}}>
          <div className="card-hdr">New Personnel</div>
          <div className="add-form">
            <div className="add-2col">
              <div><div className="label">Rank</div>
                <select value={np.rank} onChange={e=>setNp({...np,rank:e.target.value})}>
                  {RANKS.map(r=><option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              <div><div className="label">Platoon</div>
                <select value={np.plt} onChange={e=>{const secs=sectionsFor(e.target.value);setNp({...np,plt:e.target.value,sec:secs[0]||''});setNewSecInput('');setAddingNewSec(false);}}>
                  {PLATOONS.map(p=><option key={p} value={p}>{P_LABEL[p]}</option>)}
                </select>
              </div>
            </div>
            <div><div className="label">Section</div>
              {addingNewSec?(
                <div>
                  <input type="text" placeholder="New section name (e.g. SIGNALS)" value={newSecInput}
                    onChange={e=>setNewSecInput(e.target.value.toUpperCase())}
                    onKeyDown={e=>{if(e.key==='Enter')confirmNewSec(newSecInput);if(e.key==='Escape'){setAddingNewSec(false);setNewSecInput('');}}}
                    autoFocus style={{marginBottom:'6px'}}/>
                  <div style={{display:'flex',gap:'6px'}}>
                    <button className="btn-save" style={{flex:1}} onClick={()=>confirmNewSec(newSecInput)}>✓ Create "{newSecInput||'…'}"</button>
                    <button className="btn-cancel" onClick={()=>{setAddingNewSec(false);setNewSecInput('');}}>✕</button>
                  </div>
                </div>
              ):(
                <>
                  <select value={np.sec} onChange={e=>{if(e.target.value==='__other__'){setAddingNewSec(true);setNewSecInput('');}else setNp({...np,sec:e.target.value});}}>
                    {sectionsFor(np.plt).map(s=><option key={s} value={s}>{s}</option>)}
                    <option value="__other__">Other (create new)…</option>
                  </select>
                  {np.sec&&!sectionsFor(np.plt).includes(np.sec)&&<div style={{fontSize:'11px',color:'#0d9488',marginTop:'3px'}}>Custom section: {np.sec}</div>}
                </>
              )}
            </div>
            <div><div className="label">Full Name</div>
              <input type="text" placeholder="e.g. TAN AH KOW" value={np.name} onChange={e=>setNp({...np,name:e.target.value})}/>
            </div>
            <div><div className="label">Short name for Telegram</div>
              <input type="text" placeholder="e.g. AH KOW" value={np.dn} onChange={e=>setNp({...np,dn:e.target.value})}/>
            </div>
            <div className="add-2col">
              <div><div className="label">Strength Status</div>
                <select value={np.siso.type} onChange={e=>setNp({...np,siso:e.target.value==='so_till'?{type:'so_till',date:''}:{type:e.target.value}})}>
                  <option value="si">S/I (Stay In)</option>
                  <option value="so">S/O (Stay Out)</option>
                  <option value="so_till">S/O Till Date</option>
                </select>
                {np.siso.type==='so_till'&&<input type="date" value={np.siso.date||''} onChange={e=>setNp({...np,siso:{type:'so_till',date:e.target.value}})} style={{marginTop:'6px'}}/>}
              </div>
              <div><div className="label">Phone Number</div>
                <input type="tel" placeholder="e.g. 91234567" value={np.phone||''} onChange={e=>setNp({...np,phone:e.target.value.trim()})}/>
              </div>
            </div>
            <div><div className="label">PES Status</div>
              <select value={PES_LIST.includes(np.pes||'')?np.pes||'':'__other__'} onChange={e=>{if(e.target.value==='__other__')setNp({...np,pes:'OTHER:'});else setNp({...np,pes:e.target.value});}}>
                {PES_LIST.map(p=><option key={p} value={p}>{p||'— Not set —'}</option>)}
                <option value="__other__">Others (custom)…</option>
              </select>
              {!PES_LIST.includes(np.pes||'')&&<input type="text" placeholder="e.g. BP3" value={np.pes.replace(/^OTHER:/,'')} onChange={e=>setNp({...np,pes:e.target.value.toUpperCase().trim()||'OTHER:'})} style={{marginTop:'6px'}}/>}
            </div>
            <button className="sbtn" style={{margin:0}} onClick={add}>Add Personnel</button>
          </div>
        </div>
      )}
      <div className="ftabs" style={{marginBottom:'8px'}}>
        {['ALL','P1','P2','HQ'].map(p=>(
          <button key={p} className={`ftab${filterPlt===p?' on':''}`} onClick={()=>setFilterPlt(p)}>
            {p==='ALL'?`All (${personnel.filter(x=>x.active).length})`:p==='HQ'?`HQ (${personnel.filter(x=>x.active&&x.plt==='HQ').length})`:`${P_LABEL[p]} (${personnel.filter(x=>x.active&&x.plt===p).length})`}
          </button>
        ))}
      </div>
      <div className="card">
        <div className="card-hdr">Active Roster</div>
        {PLATOONS.filter(p=>tree[p]).map(p=>(
          <div key={p}>
            {[...new Set([...(P_SECTIONS[p]||[]),...Object.keys(tree[p]||{})])].filter(s=>tree[p]&&tree[p][s]&&tree[p][s].length>0).map(s=>(
              <div key={s}>
                <div className="sec-sep" style={{background:pltColors[p]}}>{P_LABEL[p]} — {s} ({tree[p][s].length})</div>
                {tree[p][s].map(person=>(
                  <div key={person.id}>
                    {editId===person.id?(
                      <div className="edit-form">
                        <div className="add-2col">
                          <div><div className="label">Rank</div>
                            <select value={editData.rank} onChange={e=>setEditData({...editData,rank:e.target.value})}>
                              {RANKS.map(r=><option key={r}>{r}</option>)}
                            </select>
                          </div>
                          <div><div className="label">Platoon</div>
                            <select value={editData.plt} onChange={e=>setEditData({...editData,plt:e.target.value})}>
                              {PLATOONS.map(p=><option key={p} value={p}>{P_LABEL[p]}</option>)}
                            </select>
                          </div>
                        </div>
                        <div><div className="label">Section</div>
                          {addingNewSecEdit?(
                            <div>
                              <input type="text" placeholder="New section name" value={editSecInput}
                                onChange={e=>setEditSecInput(e.target.value.toUpperCase())}
                                onKeyDown={e=>{if(e.key==='Enter')confirmNewSecEdit(editSecInput);if(e.key==='Escape'){setAddingNewSecEdit(false);setEditSecInput('');}}}
                                autoFocus style={{marginBottom:'6px'}}/>
                              <div style={{display:'flex',gap:'6px'}}>
                                <button className="btn-save" style={{flex:1}} onClick={()=>confirmNewSecEdit(editSecInput)}>✓ Create "{editSecInput||'…'}"</button>
                                <button className="btn-cancel" onClick={()=>{setAddingNewSecEdit(false);setEditSecInput('');}}>✕</button>
                              </div>
                            </div>
                          ):(
                            <>
                              <select value={editData.sec} onChange={e=>{if(e.target.value==='__other__'){setAddingNewSecEdit(true);setEditSecInput('');}else setEditData({...editData,sec:e.target.value});}}>
                                {sectionsFor(editData.plt).map(s=><option key={s}>{s}</option>)}
                                <option value="__other__">Other (create new)…</option>
                              </select>
                              {editData.sec&&!sectionsFor(editData.plt).includes(editData.sec)&&<div style={{fontSize:'11px',color:'#0d9488',marginTop:'3px'}}>Custom section: {editData.sec}</div>}
                            </>
                          )}
                        </div>
                        <input type="text" value={editData.name} onChange={e=>setEditData({...editData,name:e.target.value})} placeholder="Full name"/>
                        <input type="text" value={editData.dn} onChange={e=>setEditData({...editData,dn:e.target.value})} placeholder="Short name"/>
                        <div className="add-2col">
                          <div><div className="label">Strength Status</div>
                            <select value={(editData.siso||{type:'si'}).type} onChange={e=>setEditData({...editData,siso:e.target.value==='so_till'?{type:'so_till',date:(editData.siso||{}).date||''}:{type:e.target.value}})}>
                              <option value="si">S/I (Stay In)</option>
                              <option value="so">S/O (Stay Out)</option>
                              <option value="so_till">S/O Till Date</option>
                            </select>
                            {(editData.siso||{}).type==='so_till'&&<input type="date" value={(editData.siso||{}).date||''} onChange={e=>setEditData({...editData,siso:{type:'so_till',date:e.target.value}})} style={{marginTop:'6px'}}/>}
                          </div>
                          <div><div className="label">Phone Number</div>
                            <input type="tel" placeholder="e.g. 91234567" value={editData.phone||''} onChange={e=>setEditData({...editData,phone:e.target.value.trim()})}/>
                          </div>
                        </div>
                        <div><div className="label">PES Status</div>
                          <select value={PES_LIST.includes(editData.pes||'')?editData.pes||'':'__other__'} onChange={e=>{if(e.target.value==='__other__')setEditData({...editData,pes:'OTHER:'});else setEditData({...editData,pes:e.target.value});}}>
                            {PES_LIST.map(p=><option key={p} value={p}>{p||'— Not set —'}</option>)}
                            <option value="__other__">Others (custom)…</option>
                          </select>
                          {!PES_LIST.includes(editData.pes||'')&&<input type="text" placeholder="e.g. BP3" value={editData.pes.replace(/^OTHER:/,'')} onChange={e=>setEditData({...editData,pes:e.target.value.toUpperCase().trim()||'OTHER:'})} style={{marginTop:'6px'}}/>}
                        </div>
                        <div className="btn-row">
                          <button className="btn-save" onClick={()=>saveEdit(person.id)}>Save</button>
                          <button className="btn-cancel" onClick={()=>setEditId(null)}>Cancel</button>
                        </div>
                      </div>
                    ):(
                      <div className="mrow">
                        <div className="mrow-info">
                          <div className="mrow-name">{person.rank} {person.name} <span className={sisoBadgeClass(person)} style={{marginLeft:'4px'}}>{sisoLabel(person)}</span>{person.pes&&<span className="prow-pes" style={{marginLeft:'4px',fontSize:'10px'}}>PES {person.pes}</span>}</div>
                          <div className="mrow-sub">Msg: {person.dn}</div>
                        </div>
                        <div style={{display:'flex',gap:'5px',flexShrink:0}}>
                          <button className="ebtn" onClick={()=>startEdit(person)}>Edit</button>
                          {confirm===person.id?(
                            <><button className="conf-yes" onClick={()=>deactivate(person.id)}>Yes</button>
                            <button className="conf-no" onClick={()=>setConfirm(null)}>No</button></>
                          ):(
                            <button className="dbtn" onClick={()=>setConfirm(person.id)}>Remove</button>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            ))}
          </div>
        ))}
      </div>
      {inactive.length>0&&(
        <div className="card">
          <div className="card-hdr" style={{color:'#94a3b8'}}>Archived ({inactive.length}) <span style={{fontWeight:400,fontSize:'12px'}}>— auto-removed after {ARCHIVE_DAYS} days</span></div>
          {inactive.map(p=>{
            const daysGone=Math.floor((new Date(todayStr())-new Date(p.removedDate))/(1000*60*60*24));
            const daysLeft=ARCHIVE_DAYS-daysGone;
            return(
            <div key={p.id} className="mrow" style={{opacity:.65}}>
              <div className="mrow-info">
                <div className="mrow-name">{p.rank} {p.name}</div>
                <div className="mrow-sub" style={{display:'flex',gap:'8px',alignItems:'center'}}>
                  <span>{P_LABEL[p.plt]||p.plt} — {p.sec}</span>
                  <span style={{fontSize:'11px',background:'#fee2e2',color:'#dc2626',borderRadius:'10px',padding:'1px 7px',fontWeight:600}}>
                    {daysLeft}d left
                  </span>
                </div>
              </div>
              <button className="rbtn" onClick={()=>restore(p.id)}>Restore</button>
            </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={error:null,info:null};}
  componentDidCatch(error,info){this.setState({error,info});}
  render(){
    if(this.state.error){
      const msg=this.state.error&&this.state.error.message?this.state.error.message:'Unknown error';
      return(
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#fff7ed',padding:'24px'}}>
          <div style={{maxWidth:'420px',width:'100%',background:'#fff',borderRadius:'18px',boxShadow:'0 8px 32px rgba(0,0,0,.12)',padding:'28px 24px',textAlign:'center'}}>
            <div style={{fontSize:'40px',marginBottom:'12px'}}>⚠️</div>
            <div style={{fontWeight:800,fontSize:'18px',color:'#0f172a',marginBottom:'8px'}}>Something went wrong</div>
            <div style={{fontSize:'13px',color:'#64748b',marginBottom:'16px',lineHeight:1.5}}>The app ran into an unexpected error. Please contact <strong style={{color:'#0d9488'}}>Vinith</strong> for assistance.</div>
            <div style={{background:'#f1f5f9',borderRadius:'10px',padding:'10px 14px',marginBottom:'20px',textAlign:'left'}}>
              <div style={{fontSize:'10px',fontWeight:800,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.6px',marginBottom:'4px'}}>Error details</div>
              <div style={{fontFamily:'monospace',fontSize:'11px',color:'#dc2626',wordBreak:'break-all'}}>{msg}</div>
            </div>
            <button onClick={()=>window.location.reload()} style={{width:'100%',padding:'12px',background:'#0d9488',color:'#fff',border:'none',borderRadius:'12px',fontSize:'14px',fontWeight:800,cursor:'pointer'}}>🔄 Reload App</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><Root/></ErrorBoundary>);
</script>
</body>
</html>
